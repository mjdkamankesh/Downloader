name: ⬇️ دانلود از BuzzHeavier

on:
  workflow_dispatch:
    inputs:
      urls:
        description: '🔗 لینک‌های BuzzHeavier (با فاصله جدا کنید)'
        required: true
        type: string
      server:
        description: '🖥️ انتخاب سرور دانلود'
        required: false
        default: '1'
        type: choice
        options:
          - '1'
          - '2'
          - 'all'
      mode:
        description: '📦 حالت ذخیره‌سازی'
        required: false
        default: 'single'
        type: choice
        options:
          - single
          - zip
      password:
        description: '🔒 رمز عبور برای فایل zip (اختیاری)'
        required: false
        default: ''
        type: string

jobs:
  download:
    runs-on: ubuntu-latest
    timeout-minutes: 120
    permissions:
      contents: write
    
    steps:
      - name: بررسی ورودی
        run: |
          if [ -z "${{ github.event.inputs.urls }}" ]; then
            echo "❌ لینکی وارد نشده است"
            exit 1
          fi
          echo "✅ ورودی دریافت شد"

      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: نصب پیش‌نیازها
        run: |
          sudo apt-get update
          sudo apt-get install -y aria2 zip curl
          pip3 install requests beautifulsoup4
          echo "✅ پیش‌نیازها نصب شد"

      - name: ایجاد اسکریپت استخراج لینک
        run: |
          cat > /tmp/bh_extractor.py << 'PYEOF'
          import re
          import sys
          import requests
          from bs4 import BeautifulSoup
          from urllib.parse import urljoin, unquote

          def extract_download_links(url):
              headers = {
                  'User-Agent': 'Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36'
              }
              
              try:
                  response = requests.get(url, headers=headers, timeout=30)
                  response.raise_for_status()
                  
                  soup = BeautifulSoup(response.text, 'html.parser')
                  
                  # نام فایل
                  title_tag = soup.find('title')
                  filename = title_tag.text.strip() if title_tag else None
                  
                  # لینک‌های دانلود
                  download_links = []
                  for a_tag in soup.find_all('a', href=True):
                      hx_get = a_tag.get('hx-get', '')
                      href = a_tag.get('href', '')
                      link = hx_get or href
                      
                      if link and '/download?' in link:
                          full_url = urljoin(url, link)
                          text = a_tag.text.strip()
                          
                          # تشخیص سرور
                          if 'Server 1' in text or (not 'Server 2' in text and 'alt=true' not in full_url):
                              server = '1'
                          elif 'Server 2' in text or 'alt=true' in full_url:
                              server = '2'
                          else:
                              server = '1'
                          
                          download_links.append({
                              'url': full_url,
                              'server': server
                          })
                  
                  return {
                      'filename': filename,
                      'downloads': download_links
                  }
              
              except Exception as e:
                  print(f"ERROR:{e}", file=sys.stderr)
                  return None

          if __name__ == "__main__":
              if len(sys.argv) < 2:
                  print("ERROR: No URL provided")
                  sys.exit(1)
              
              url = sys.argv[1]
              result = extract_download_links(url)
              
              if result and result['downloads']:
                  print(f"FILENAME:{result['filename']}")
                  for dl in result['downloads']:
                      print(f"DOWNLOAD_URL:{dl['url']}")
                      print(f"SERVER:{dl['server']}")
              else:
                  print("ERROR: No download links found")
                  sys.exit(1)
          PYEOF

      - name: استخراج و دانلود
        run: |
          URLS="${{ github.event.inputs.urls }}"
          SERVER_CHOICE="${{ github.event.inputs.server }}"
          MODE="${{ github.event.inputs.mode }}"
          ZIP_PASSWORD="${{ github.event.inputs.password }}"
          
          SPLIT_SIZE=45  # MB
          
          BACKUP_DIR="/tmp/dl_$$"
          mkdir -p "$BACKUP_DIR" downloads tmp_downloads
          
          for URL in $URLS; do
            echo "🔍 پردازش: $URL"
            
            # استخراج لینک دانلود
            OUTPUT=$(python3 /tmp/bh_extractor.py "$URL" 2>/tmp/bh_error.log)
            
            FILENAME=$(echo "$OUTPUT" | grep "^FILENAME:" | cut -d':' -f2-)
            echo "📁 فایل: $FILENAME"
            
            # انتخاب لینک دانلود بر اساس سرور
            if [ "$SERVER_CHOICE" = "all" ]; then
              # دانلود از همه سرورها
              DOWNLOAD_URLS=$(echo "$OUTPUT" | grep "^DOWNLOAD_URL:" | cut -d':' -f2-)
            else
              # دانلود از سرور انتخاب شده
              DOWNLOAD_URLS=$(echo "$OUTPUT" | grep "^DOWNLOAD_URL:" | grep -A1 "SERVER:$SERVER_CHOICE" | grep "^DOWNLOAD_URL:" | cut -d':' -f2-)
              
              # اگر سرور مورد نظر نبود، سرور 1 را انتخاب کن
              if [ -z "$DOWNLOAD_URLS" ]; then
                DOWNLOAD_URLS=$(echo "$OUTPUT" | grep "^DOWNLOAD_URL:" | head -1 | cut -d':' -f2-)
              fi
            fi
            
            # دانلود فایل‌ها
            DL_COUNT=0
            for DL_URL in $DOWNLOAD_URLS; do
              DL_COUNT=$((DL_COUNT + 1))
              
              # نام فایل برای ذخیره
              if [ "$SERVER_CHOICE" = "all" ] && [ $DL_COUNT -gt 1 ]; then
                SAVE_NAME="server${DL_COUNT}_${FILENAME}"
              else
                SAVE_NAME="$FILENAME"
              fi
              
              echo "⏬ دانلود [$DL_COUNT]: $SAVE_NAME"
              
              # دانلود با aria2
              aria2c \
                --split=8 \
                --max-connection-per-server=8 \
                --min-split-size=20M \
                --max-tries=5 \
                --retry-wait=5 \
                --timeout=120 \
                --connect-timeout=30 \
                --allow-overwrite=true \
                --auto-file-renaming=false \
                --dir="tmp_downloads" \
                --out="$SAVE_NAME" \
                "$DL_URL" 2>&1 || {
                  echo "⚠️ aria2 ناموفق - استفاده از curl"
                  curl -L -# \
                    --retry 3 \
                    --retry-delay 5 \
                    --connect-timeout 30 \
                    --max-time 7200 \
                    -A "Mozilla/5.0" \
                    -o "tmp_downloads/$SAVE_NAME" \
                    "$DL_URL" || echo "❌ دانلود ناموفق: $SAVE_NAME"
                }
            done
          done
          
          # پردازش و بسته‌بندی
          echo "📦 بسته‌بندی فایل‌ها..."
          
          if [ "$MODE" = "zip" ]; then
            ARCHIVE_NAME="buzzheavier_$(date +%Y%m%d_%H%M%S)"
            mkdir -p "$BACKUP_DIR/$ARCHIVE_NAME"
            
            if [ -n "$ZIP_PASSWORD" ]; then
              zip -j -P "$ZIP_PASSWORD" -s ${SPLIT_SIZE}m \
                "$BACKUP_DIR/$ARCHIVE_NAME/${ARCHIVE_NAME}.zip" \
                tmp_downloads/*
            else
              zip -j -s ${SPLIT_SIZE}m \
                "$BACKUP_DIR/$ARCHIVE_NAME/${ARCHIVE_NAME}.zip" \
                tmp_downloads/*
            fi
            
            # README
            echo "# $ARCHIVE_NAME" > "$BACKUP_DIR/$ARCHIVE_NAME/README.md"
            echo "" >> "$BACKUP_DIR/$ARCHIVE_NAME/README.md"
            echo "| فایل | حجم |" >> "$BACKUP_DIR/$ARCHIVE_NAME/README.md"
            echo "|------|------|" >> "$BACKUP_DIR/$ARCHIVE_NAME/README.md"
            for f in tmp_downloads/*; do
              [ -f "$f" ] || continue
              SIZE=$(du -h "$f" | cut -f1)
              echo "| $(basename "$f") | $SIZE |" >> "$BACKUP_DIR/$ARCHIVE_NAME/README.md"
            done
          else
            for FILE in tmp_downloads/*; do
              [ -f "$FILE" ] || continue
              
              BASENAME=$(basename "$FILE")
              SIZE=$(stat -c%s "$FILE")
              SIZE_MB=$((SIZE / 1024 / 1024))
              
              FOLDER="${BASENAME%.*}_$(date +%s)"
              mkdir -p "$BACKUP_DIR/$FOLDER"
              
              if [ "$SIZE" -gt $((SPLIT_SIZE * 1024 * 1024)) ]; then
                if [ -n "$ZIP_PASSWORD" ]; then
                  zip -j -P "$ZIP_PASSWORD" -s ${SPLIT_SIZE}m \
                    "$BACKUP_DIR/$FOLDER/${FOLDER}.zip" "$FILE"
                else
                  zip -j -s ${SPLIT_SIZE}m \
                    "$BACKUP_DIR/$FOLDER/${FOLDER}.zip" "$FILE"
                fi
              else
                if [ -n "$ZIP_PASSWORD" ]; then
                  zip -j -P "$ZIP_PASSWORD" \
                    "$BACKUP_DIR/$FOLDER/${FOLDER}.zip" "$FILE"
                else
                  zip -j "$BACKUP_DIR/$FOLDER/${FOLDER}.zip" "$FILE"
                fi
              fi
              
              echo "# $BASENAME" > "$BACKUP_DIR/$FOLDER/README.md"
              echo "**حجم:** ${SIZE_MB}MB" >> "$BACKUP_DIR/$FOLDER/README.md"
            done
          fi
          
          # کپی به downloads
          cp -r "$BACKUP_DIR"/* downloads/ 2>/dev/null
          
          echo "✅ عملیات کامل شد"

      - name: آپلود در گیتهاب
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          
          git add -f downloads/ 2>/dev/null
          
          if git diff --cached --quiet 2>/dev/null; then
            echo "ℹ️ فایلی برای آپلود نیست"
            exit 0
          fi
          
          git commit -m "📥 دانلود از BuzzHeavier [skip ci]"
          
          for i in {1..5}; do
            if git push origin "${GITHUB_REF_NAME}" 2>&1; then
              echo "✅ آپلود موفق"
              exit 0
            fi
            echo "🔄 تلاش $i ناموفق - 10 ثانیه صبر..."
            sleep 10
          done
          
          echo "❌ آپلود ناموفق"
