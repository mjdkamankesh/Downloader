name: ⬇️ دانلود از BuzzHeavier

on:
  workflow_dispatch:
    inputs:
      urls:
        description: '🔗 لینک‌های BuzzHeavier (با فاصله جدا کنید)'
        required: true
        type: string
      server:
        description: '🖥️ سرور دانلود'
        required: false
        default: '1'
        type: choice
        options:
          - '1'
          - '2'
          - 'all'
      mode:
        description: '📦 حالت ذخیره‌سازی'
        required: false
        default: 'single'
        type: choice
        options:
          - single
          - zip
      password:
        description: '🔒 رمز عبور zip (اختیاری)'
        required: false
        default: ''
        type: string

jobs:
  download:
    runs-on: ubuntu-latest
    timeout-minutes: 120
    permissions:
      contents: write
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: نصب پیش‌نیازها
        run: |
          sudo apt-get update
          sudo apt-get install -y aria2 zip curl python3 python3-pip
          pip3 install requests beautifulsoup4

      - name: ایجاد اسکریپت پایتون
        run: |
          cat > bh_extractor.py << 'ENDOFSCRIPT'
          import sys, requests, re
          from bs4 import BeautifulSoup
          from urllib.parse import urljoin
          
          url = sys.argv[1]
          
          try:
              resp = requests.get(url, headers={'User-Agent': 'Mozilla/5.0'}, timeout=30)
              soup = BeautifulSoup(resp.text, 'html.parser')
              
              # نام فایل
              title = soup.find('title')
              fname = title.text.strip() if title else 'unknown'
              print(f"FILENAME:{fname}")
              
              # لینک‌های دانلود
              count = 0
              for a in soup.find_all('a'):
                  link = a.get('hx-get') or a.get('href') or ''
                  if '/download?' in link:
                      count += 1
                      full = urljoin(url, link)
                      # تعیین سرور
                      txt = a.text.strip()
                      if 'Server 2' in txt or 'alt=true' in link:
                          srv = '2'
                      else:
                          srv = '1'
                      print(f"DOWNLOAD_URL:{full}")
                      print(f"SERVER:{srv}")
              
              if count == 0:
                  print("ERROR:no_links", file=sys.stderr)
                  sys.exit(1)
          
          except Exception as e:
              print(f"ERROR:{e}", file=sys.stderr)
              sys.exit(1)
          ENDOFSCRIPT
          
          chmod +x bh_extractor.py
          echo "✅ اسکریپت ایجاد شد"
          
          # تست سریع
          python3 bh_extractor.py --help 2>&1 || true

      - name: تست اسکریپت
        run: |
          echo "🧪 تست اسکریپت با لینک نمونه..."
          python3 bh_extractor.py "https://buzzheavier.com/4h7frwdqg4g9" 2>&1 || true
          echo ""
          echo "✅ اگر خروجی بالا را دیدید، اسکریپت کار می‌کند"

      - name: دانلود فایل‌ها
        run: |
          URLS="${{ github.event.inputs.urls }}"
          SERVER="${{ github.event.inputs.server }}"
          MODE="${{ github.event.inputs.mode }}"
          PASS="${{ github.event.inputs.password }}"
          
          mkdir -p downloads tmp_downloads
          
          for URL in $URLS; do
            echo ""
            echo "════════════════════════════════════"
            echo "🔍 پردازش: $URL"
            
            # اجرای اسکریپت
            OUTPUT=$(python3 bh_extractor.py "$URL" 2>/tmp/err.log)
            RC=$?
            
            if [ $RC -ne 0 ]; then
              echo "❌ خطا در استخراج لینک:"
              cat /tmp/err.log
              continue
            fi
            
            # نمایش خروجی
            echo "$OUTPUT"
            
            # استخراج نام فایل
            FNAME=$(echo "$OUTPUT" | grep "^FILENAME:" | head -1 | cut -d: -f2-)
            [ -z "$FNAME" ] && FNAME="file_$(date +%s)"
            echo "📁 فایل: $FNAME"
            
            # استخراج لینک‌ها
            if [ "$SERVER" = "all" ]; then
              URLS_DL=$(echo "$OUTPUT" | grep "^DOWNLOAD_URL:" | cut -d: -f2-)
            elif [ "$SERVER" = "2" ]; then
              URLS_DL=$(echo "$OUTPUT" | grep -B1 "SERVER:2" | grep "^DOWNLOAD_URL:" | cut -d: -f2-)
              [ -z "$URLS_DL" ] && URLS_DL=$(echo "$OUTPUT" | grep "^DOWNLOAD_URL:" | head -1 | cut -d: -f2-)
            else
              URLS_DL=$(echo "$OUTPUT" | grep "^DOWNLOAD_URL:" | head -1 | cut -d: -f2-)
            fi
            
            [ -z "$URLS_DL" ] && { echo "❌ لینکی پیدا نشد"; continue; }
            
            # دانلود
            N=0
            echo "$URLS_DL" | while read DL; do
              [ -z "$DL" ] && continue
              N=$((N + 1))
              
              # رفع &amp;
              DL=$(echo "$DL" | sed 's/&amp;/\&/g')
              
              if [ "$SERVER" = "all" ] && [ $N -gt 1 ]; then
                SNAME="s${N}_${FNAME}"
              else
                SNAME="$FNAME"
              fi
              
              echo "⏬ [$N] $SNAME"
              
              aria2c -x8 -s8 -k20M --max-tries=5 -d tmp_downloads -o "$SNAME" "$DL" 2>&1 || {
                echo "⚠️ fallback to curl..."
                curl -L -o "tmp_downloads/$SNAME" -A "Mozilla/5.0" -H "Referer: $URL" "$DL" --retry 3 -#
              }
            done
          done
          
          # نمایش فایل‌های دانلود شده
          echo ""
          echo "📊 فایل‌های دانلود شده:"
          ls -lh tmp_downloads/ 2>/dev/null || echo "خالی"
          
          [ -z "$(ls -A tmp_downloads 2>/dev/null)" ] && { echo "❌ فایلی نیست"; exit 1; }
          
          # بسته‌بندی
          echo "📦 بسته‌بندی..."
          
          if [ "$MODE" = "zip" ]; then
            ZIPNAME="buzzheavier_$(date +%Y%m%d_%H%M%S)"
            mkdir -p "downloads/$ZIPNAME"
            [ -n "$PASS" ] && ZIPOPT="-P $PASS" || ZIPOPT=""
            zip -j $ZIPOPT -s 45m "downloads/$ZIPNAME/$ZIPNAME.zip" tmp_downloads/*
            echo "# $ZIPNAME" > "downloads/$ZIPNAME/README.md"
          else
            for f in tmp_downloads/*; do
              [ -f "$f" ] || continue
              B=$(basename "$f")
              S=$(stat -c%s "$f")
              F="downloads/${B%.*}_$(date +%s)"
              mkdir -p "$F"
              [ -n "$PASS" ] && ZIPOPT="-P $PASS" || ZIPOPT=""
              [ $S -gt 47185920 ] && zip -j $ZIPOPT -s 45m "$F/$B.zip" "$f" || zip -j $ZIPOPT "$F/$B.zip" "$f"
              echo "# $B ($((S/1024/1024))MB)" > "$F/README.md"
            done
          fi
          
          echo "✅ تمام"

      - name: آپلود
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add -f downloads/
          git diff --cached --quiet && { echo "بدون تغییر"; exit 0; }
          git commit -m "📥 BuzzHeavier [skip ci]"
          for i in 1 2 3 4 5; do
            git push origin "${GITHUB_REF_NAME}" && { echo "✅ آپلود شد"; exit 0; }
            sleep 10
          done
          echo "❌ آپلود ناموفق"
