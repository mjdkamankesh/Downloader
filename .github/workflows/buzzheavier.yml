name: ⬇️ دانلود از BuzzHeavier

on:
  workflow_dispatch:
    inputs:
      urls:
        description: '🔗 لینک‌های BuzzHeavier (با فاصله جدا کنید)'
        required: true
        type: string
      mode:
        description: '📦 حالت دانلود'
        required: false
        default: 'normal'
        type: choice
        options:
          - normal
          - zip
      password:
        description: '🔒 رمز عبور برای فایل زیپ (اختیاری)'
        required: false
        default: ''
        type: string

jobs:
  download:
    runs-on: ubuntu-latest
    timeout-minutes: 120
    permissions:
      contents: write
    steps:
      - name: بررسی لینک ورودی
        run: |
          if [ -z "${{ github.event.inputs.urls }}" ]; then
            echo "❌ لینک دانلود وارد نشده است!"
            exit 1
          fi
          echo "✅ لینک‌های دانلود دریافت شد"

      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: نصب پیش‌نیازها
        run: |
          sudo apt-get update
          sudo apt-get install -y aria2 zip curl bc python3 python3-pip
          pip3 install requests beautifulsoup4 tqdm cloudscraper

      - name: آماده‌سازی اسکریپت BuzzHeavier
        run: |
          cat > bhdownload.py << 'PYEOF'
          import cloudscraper
          from bs4 import BeautifulSoup
          import sys
          import re
          import json
          import urllib.parse
          
          def get_direct_link(url_or_id):
              # استخراج ID از URL
              original_input = url_or_id
              if '/' in url_or_id:
                  url_or_id = url_or_id.rstrip('/').split('/')[-1]
              
              # حذف پارامترهای اضافی
              url_or_id = url_or_id.split('?')[0].split('#')[0]
              
              if len(url_or_id) != 12:
                  print(f"Error: Invalid ID length: {url_or_id}", file=sys.stderr)
                  return None, None
              
              print(f"[DEBUG] Processing ID: {url_or_id}", file=sys.stderr)
              
              # استفاده از cloudscraper برای دور زدن Cloudflare
              scraper = cloudscraper.create_scraper(
                  browser={
                      'browser': 'chrome',
                      'platform': 'windows',
                      'mobile': False
                  }
              )
              
              headers = {
                  'User-Agent': 'Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/120.0.0.0 Safari/537.36',
                  'Accept': 'text/html,application/xhtml+xml,application/xml;q=0.9,image/webp,*/*;q=0.8',
                  'Accept-Language': 'en-US,en;q=0.5',
                  'Accept-Encoding': 'gzip, deflate, br',
                  'DNT': '1',
                  'Connection': 'keep-alive',
                  'Upgrade-Insecure-Requests': '1',
                  'Sec-Fetch-Dest': 'document',
                  'Sec-Fetch-Mode': 'navigate',
                  'Sec-Fetch-Site': 'none',
                  'Sec-Fetch-User': '?1',
                  'Cache-Control': 'max-age=0'
              }
              
              try:
                  # روش اول: API مستقیم
                  print(f"[DEBUG] Trying API method...", file=sys.stderr)
                  api_url = f"https://buzzheavier.com/api/download/{url_or_id}"
                  response = scraper.get(api_url, headers=headers, timeout=30)
                  
                  if response.status_code == 200:
                      try:
                          data = response.json()
                          if 'url' in data and data['url']:
                              download_link = data['url']
                              filename = data.get('name', '')
                              print(f"[DEBUG] API Success - Filename: {filename}", file=sys.stderr)
                              print(f"[DEBUG] Download URL: {download_link}", file=sys.stderr)
                              return download_link, filename
                      except:
                          pass
                  
                  # روش دوم: اسکرپ صفحه اصلی
                  print(f"[DEBUG] Trying page scraping...", file=sys.stderr)
                  main_url = f"https://buzzheavier.com/{url_or_id}"
                  response = scraper.get(main_url, headers=headers, timeout=30)
                  
                  if response.status_code == 200:
                      soup = BeautifulSoup(response.text, 'html.parser')
                      
                      # ذخیره HTML برای دیباگ
                      with open('/tmp/buzzheavier_debug.html', 'w', encoding='utf-8') as f:
                          f.write(response.text)
                      print(f"[DEBUG] Page HTML saved to /tmp/buzzheavier_debug.html", file=sys.stderr)
                      
                      # استخراج نام فایل
                      filename = None
                      title_tag = soup.find('title')
                      if title_tag and title_tag.text.strip():
                          filename = title_tag.text.strip()
                          print(f"[DEBUG] Title found: {filename}", file=sys.stderr)
                      
                      # جستجوی لینک دانلود در تمام اسکریپت‌ها
                      for script in soup.find_all('script'):
                          if script.string:
                              # جستجوی URLهای مختلف
                              patterns = [
                                  r'"(https?://[^"]*download[^"]*)"',
                                  r'"(https?://[^"]*cdn[^"]*)"',
                                  r'"(https?://[^"]*buzzheavier[^"]*)"',
                                  r'"(https?://[^"]*\.zip[^"]*)"',
                                  r'"(https?://[^"]*\.rar[^"]*)"',
                                  r'"(https?://[^"]*\.7z[^"]*)"',
                                  r'downloadUrl["\s:=]+["\']([^"\']+)["\']',
                                  r'url["\s:=]+["\']([^"\']+)["\']',
                              ]
                              
                              for pattern in patterns:
                                  matches = re.findall(pattern, script.string, re.IGNORECASE)
                                  for match in matches:
                                      if match.startswith('http') and url_or_id in match:
                                          print(f"[DEBUG] Found download link in script: {match}", file=sys.stderr)
                                          return match, filename
                      
                      # جستجو در لینک‌های صفحه
                      for a in soup.find_all('a', href=True):
                          href = a['href']
                          if 'download' in href.lower() and url_or_id in href:
                              print(f"[DEBUG] Found download link in href: {href}", file=sys.stderr)
                              return href, filename
                      
                      # جستجوی دکمه دانلود
                      download_button = soup.find('button', {'id': 'download-button'})
                      if download_button and download_button.get('onclick'):
                          onclick = download_button.get('onclick')
                          url_match = re.search(r"window\.location\.href=['\"]([^'\"]+)['\"]", onclick)
                          if url_match:
                              download_link = url_match.group(1)
                              print(f"[DEBUG] Found download link in button: {download_link}", file=sys.stderr)
                              return download_link, filename
                      
                      # روش سوم: API جایگزین
                      print(f"[DEBUG] Trying alternative API...", file=sys.stderr)
                      alt_api_url = f"https://buzzheavier.com/{url_or_id}/download"
                      response = scraper.get(alt_api_url, headers=headers, allow_redirects=False, timeout=30)
                      
                      if response.status_code in [301, 302, 303, 307, 308]:
                          redirect_url = response.headers.get('Location', '')
                          if redirect_url:
                              print(f"[DEBUG] Redirect found: {redirect_url}", file=sys.stderr)
                              return redirect_url, filename
                      
                      # روش چهارم: ساخت لینک مستقیم
                      print(f"[DEBUG] Trying to construct direct link...", file=sys.stderr)
                      constructed_url = f"https://buzzheavier.com/{url_or_id}/download?direct=true"
                      response = scraper.head(constructed_url, headers=headers, allow_redirects=True, timeout=30)
                      if response.url != constructed_url:
                          print(f"[DEBUG] Constructed redirect: {response.url}", file=sys.stderr)
                          return response.url, filename
                  
                  print(f"Error: Download link not found for {url_or_id}", file=sys.stderr)
                  return None, filename
                  
              except Exception as e:
                  print(f"Error: {str(e)}", file=sys.stderr)
                  import traceback
                  traceback.print_exc(file=sys.stderr)
                  return None, None

          if __name__ == "__main__":
              if len(sys.argv) < 2:
                  print("Usage: python3 bhdownload.py <id_or_url>")
                  sys.exit(1)
              
              input_arg = sys.argv[1].rstrip('/')
              
              if input_arg == '-f' and len(sys.argv) > 2:
                  with open(sys.argv[2], 'r') as f:
                      for line in f:
                          line = line.strip()
                          if line:
                              download_link, filename = get_direct_link(line)
                              if download_link:
                                  print(f"DOWNLOAD_LINK:{download_link}")
                                  if filename:
                                      print(f"FILENAME:{filename}")
                                  print("---")
              else:
                  download_link, filename = get_direct_link(input_arg)
                  if download_link:
                      print(f"DOWNLOAD_LINK:{download_link}")
                      if filename:
                          print(f"FILENAME:{filename}")
                  else:
                      print("ERROR: Could not extract download link")
          PYEOF
          
          chmod +x bhdownload.py

      - name: تنظیمات گیت
        run: |
          git config --global http.postBuffer 524288000
          git config --global http.maxRequestBuffer 100M
          git config --global core.compression 0
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"

      - name: دانلود فایل‌ها
        run: |
          MODE="${{ github.event.inputs.mode }}"
          URLS="${{ github.event.inputs.urls }}"
          ZIP_PASSWORD="${{ github.event.inputs.password }}"
          
          SPLIT_THRESHOLD_MB=45
          BACKUP_DIR="/tmp/download_backup_$$"
          mkdir -p "$BACKUP_DIR"
          mkdir -p downloads tmp_downloads
          
          echo "📥 شروع دانلود از BuzzHeavier..."
          
          # پردازش هر لینک
          for URL in $URLS; do
            echo "🔍 پردازش لینک: $URL"
            
            # اجرای اسکریپت و ذخیره خروجی
            OUTPUT=$(python3 bhdownload.py "$URL" 2>/tmp/bh_error.log)
            EXIT_CODE=$?
            
            # نمایش لاگ برای دیباگ
            echo "📋 لاگ اسکریپت:"
            cat /tmp/bh_error.log
            
            # استخراج لینک دانلود و نام فایل از خروجی
            DIRECT_LINK=$(echo "$OUTPUT" | grep "DOWNLOAD_LINK:" | cut -d':' -f2-)
            FILENAME=$(echo "$OUTPUT" | grep "FILENAME:" | cut -d':' -f2-)
            
            if [ -n "$DIRECT_LINK" ]; then
              # اگر نام فایل پیدا نشد، از URL استخراج کن
              if [ -z "$FILENAME" ]; then
                # سعی کن از لینک مستقیم نام فایل رو بگیری
                FILENAME=$(basename "$DIRECT_LINK" | sed 's/[?#].*//')
                # اگر باز هم خالی بود، از URL اصلی استفاده کن
                if [ -z "$FILENAME" ]; then
                  FILENAME="download_$(date +%s)"
                fi
              fi
              
              # پاکسازی نام فایل
              FILENAME=$(echo "$FILENAME" | sed 's/[<>:"|?*]/_/g' | sed 's/%20/ /g')
              
              echo "📁 نام فایل: $FILENAME"
              echo "🔗 لینک مستقیم: $DIRECT_LINK"
              
              # دانلود با aria2
              echo "⏬ شروع دانلود..."
              if aria2c \
                --split=4 \
                --max-connection-per-server=4 \
                --min-split-size=20M \
                --max-tries=5 \
                --retry-wait=5 \
                --timeout=60 \
                --connect-timeout=30 \
                --allow-overwrite=true \
                --auto-file-renaming=false \
                --dir="tmp_downloads" \
                --out="$FILENAME" \
                "$DIRECT_LINK" 2>&1; then
                echo "✅ دانلود موفقیت‌آمیز بود"
              else
                echo "⚠️ دانلود با aria2 ناموفق بود، استفاده از curl..."
                if curl -L -f -# \
                  --retry 3 \
                  --retry-delay 5 \
                  --connect-timeout 30 \
                  --max-time 3600 \
                  -A "Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36" \
                  -o "tmp_downloads/$FILENAME" \
                  "$DIRECT_LINK"; then
                  echo "✅ دانلود با curl موفقیت‌آمیز بود"
                else
                  echo "❌ دانلود ناموفق بود"
                fi
              fi
            else
              echo "❌ خطا در دریافت لینک مستقیم برای: $URL"
              echo "خروجی اسکریپت: $OUTPUT"
              
              # روش fallback: دانلود مستقیم با curl از URL اصلی
              echo "🔄 استفاده از روش جایگزین..."
              FILENAME="buzzheavier_$(date +%s)"
              if curl -L -f -# \
                --retry 3 \
                --retry-delay 5 \
                --connect-timeout 30 \
                --max-time 3600 \
                -A "Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36" \
                -H "Referer: https://buzzheavier.com/" \
                -o "tmp_downloads/$FILENAME" \
                "$URL"; then
                echo "✅ دانلود با روش جایگزین موفق بود"
              else
                echo "❌ تمام روش‌های دانلود ناموفق بودند"
              fi
            fi
            
            echo "---"
          done
          
          # پردازش فایل‌های دانلود شده
          echo "📦 پردازش فایل‌های دانلود شده..."
          
          if [ "$MODE" = "zip" ]; then
            # حالت zip: همه فایل‌ها در یک آرشیو
            if [ -n "$(ls -A tmp_downloads 2>/dev/null)" ]; then
              ARCHIVE_NAME="buzzheavier_$(date +%Y%m%d_%H%M%S)"
              FOLDER_NAME="${ARCHIVE_NAME}"
              mkdir -p "$BACKUP_DIR/$FOLDER_NAME"
              
              echo "📦 ایجاد آرشیو $ARCHIVE_NAME.zip..."
              if [ -n "$ZIP_PASSWORD" ]; then
                zip -j -P "${ZIP_PASSWORD}" -s ${SPLIT_THRESHOLD_MB}m \
                  "$BACKUP_DIR/$FOLDER_NAME/${ARCHIVE_NAME}.zip" \
                  tmp_downloads/*
              else
                zip -j -s ${SPLIT_THRESHOLD_MB}m \
                  "$BACKUP_DIR/$FOLDER_NAME/${ARCHIVE_NAME}.zip" \
                  tmp_downloads/*
              fi
              
              # ایجاد README
              {
                echo "# 📦 $ARCHIVE_NAME"
                echo ""
                echo "## فایل‌های دانلود شده از BuzzHeavier"
                echo ""
                echo "| # | نام فایل | حجم |"
                echo "|---|----------|------|"
                for f in tmp_downloads/*; do
                  if [ -f "$f" ]; then
                    SIZE=$(stat -c%s "$f")
                    SIZE_MB=$((SIZE / 1024 / 1024))
                    echo "| | $(basename "$f") | ${SIZE_MB}MB |"
                  fi
                done
              } > "$BACKUP_DIR/$FOLDER_NAME/README.md"
            fi
          else
            # حالت normal: هر فایل جداگانه
            for FILE in tmp_downloads/*; do
              [ -f "$FILE" ] || continue
              
              BASENAME=$(basename "$FILE")
              SIZE=$(stat -c%s "$FILE")
              SIZE_MB=$((SIZE / 1024 / 1024))
              
              echo "📦 پردازش فایل: $BASENAME (${SIZE_MB}MB)"
              
              FOLDER_NAME="${BASENAME%.*}"
              # اطمینان از یکتا بودن نام پوشه
              if [ -d "$BACKUP_DIR/$FOLDER_NAME" ]; then
                FOLDER_NAME="${FOLDER_NAME}_$(date +%s)"
              fi
              mkdir -p "$BACKUP_DIR/$FOLDER_NAME"
              
              if [ "$SIZE" -gt $((SPLIT_THRESHOLD_MB * 1024 * 1024)) ]; then
                echo "📦 فایل بزرگ - تقسیم به بخش‌های ${SPLIT_THRESHOLD_MB}MB"
                if [ -n "$ZIP_PASSWORD" ]; then
                  zip -j -P "${ZIP_PASSWORD}" -s ${SPLIT_THRESHOLD_MB}m \
                    "$BACKUP_DIR/$FOLDER_NAME/${FOLDER_NAME}.zip" "$FILE"
                else
                  zip -j -s ${SPLIT_THRESHOLD_MB}m \
                    "$BACKUP_DIR/$FOLDER_NAME/${FOLDER_NAME}.zip" "$FILE"
                fi
              else
                echo "📦 فایل کوچک - ایجاد آرشیو"
                if [ -n "$ZIP_PASSWORD" ]; then
                  zip -j -P "${ZIP_PASSWORD}" \
                    "$BACKUP_DIR/$FOLDER_NAME/${FOLDER_NAME}.zip" "$FILE"
                else
                  zip -j "$BACKUP_DIR/$FOLDER_NAME/${FOLDER_NAME}.zip" "$FILE"
                fi
              fi
              
              # ایجاد README برای هر فایل
              {
                echo "# 📁 $BASENAME"
                echo ""
                echo "| مشخصات | مقدار |"
                echo "|--------|-------|"
                echo "| **نام فایل** | \`$BASENAME\` |"
                echo "| **حجم** | ${SIZE_MB}MB |"
                echo "| **منبع** | BuzzHeavier |"
                echo "| **تاریخ دانلود** | $(date '+%Y-%m-%d %H:%M:%S') |"
                echo ""
                echo "## نحوه استفاده"
                echo "1. فایل(های) zip را دانلود کنید"
                echo "2. با WinRAR یا 7-Zip استخراج کنید"
                if [ -n "$ZIP_PASSWORD" ]; then
                  echo "3. رمز عبور را وارد کنید"
                fi
              } > "$BACKUP_DIR/$FOLDER_NAME/README.md"
            done
          fi
          
          # کپی به پوشه downloads
          if [ -d "$BACKUP_DIR" ] && [ "$(ls -A $BACKUP_DIR 2>/dev/null)" ]; then
            cp -r "$BACKUP_DIR"/* downloads/ 2>/dev/null || true
            echo "✅ فایل‌ها به پوشه downloads کپی شدند"
          else
            echo "⚠️ هیچ فایلی برای کپی وجود ندارد"
          fi
          
          # ذخیره مسیر برای استفاده در مراحل بعدی
          echo "$BACKUP_DIR" > /tmp/backup_dir_path.txt
          
          echo "✅ دانلود و پردازش کامل شد"
          
          # نمایش فایل‌های دانلود شده
          echo ""
          echo "📊 خلاصه فایل‌های دانلود شده:"
          find downloads -type f -exec ls -lh {} \; 2>/dev/null || echo "فایلی یافت نشد"

      - name: بروزرسانی README
        run: |
          {
            echo "# 📥 فایل‌های دانلود شده از BuzzHeavier"
            echo ""
            echo "## لیست فایل‌ها"
            echo ""
            if [ -d "downloads" ]; then
              for folder in downloads/*/; do
                if [ -d "$folder" ]; then
                  FOLDER_NAME=$(basename "$folder")
                  # نمایش فایل‌های موجود در هر پوشه
                  echo "### 📁 $FOLDER_NAME"
                  for file in "$folder"/*; do
                    if [ -f "$file" ]; then
                      FILENAME=$(basename "$file")
                      SIZE=$(du -h "$file" | cut -f1)
                      echo "- 📄 \`$FILENAME\` ($SIZE)"
                    fi
                  done
                  echo ""
                fi
              done
            fi
            echo "---"
            echo "📅 آخرین بروزرسانی: $(date '+%Y-%m-%d %H:%M:%S')"
          } > "downloads/README.md"

      - name: آپلود در گیتهاب
        run: |
          echo "📤 شروع آپلود فایل‌ها..."
          
          git add -f downloads/ 2>/dev/null || true
          git add README.md 2>/dev/null || true
          
          if ! git diff --cached --quiet 2>/dev/null; then
            git commit -m "📥 آپلود فایل‌های BuzzHeavier [skip ci]"
            
            for i in {1..5}; do
              echo "🔄 تلاش $i برای push..."
              if timeout 300 git push origin "${GITHUB_REF_NAME}" 2>&1; then
                echo "✅ آپلود موفقیت‌آمیز بود"
                
                # نمایش لینک‌های دانلود
                REPO_URL="${{ github.server_url }}/${{ github.repository }}"
                echo ""
                echo "🔗 لینک‌های دانلود:"
                echo "$REPO_URL/tree/${{ github.ref_name }}/downloads"
                
                exit 0
              fi
              echo "⚠️ تلاش $i ناموفق بود، انتظار 10 ثانیه..."
              sleep 10
            done
            echo "❌ خطا در آپلود پس از 5 تلاش"
          else
            echo "ℹ️ فایلی برای آپلود وجود ندارد"
          fi
