name: 🔗 استخراج لینک مستقیم با Download URL Generator

on:
  workflow_dispatch:
    inputs:
      urls:
        description: '🔗 لینک‌ها (با فاصله یا خط جدید جدا کنید)'
        required: true
        type: string

jobs:
  extract-links:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    
    steps:
      - name: نمایش لینک‌های ورودی
        run: |
          echo "📋 لینک‌های ورودی:"
          echo "${{ github.event.inputs.urls }}"
          echo ""

      - name: Checkout
        uses: actions/checkout@v4

      - name: نصب Python و پیش‌نیازهای سیستمی
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: نصب پیش‌نیازهای کامپایل
        run: |
          sudo apt-get update
          sudo apt-get install -y python3-dev build-essential
          echo "✅ پیش‌نیازهای کامپایل نصب شدند"

      - name: کلون Download URL Generator
        run: |
          git clone https://github.com/Ryas-Yusenda/Download-URL-Generator.git /tmp/downloader
          echo "✅ مخزن کلون شد"

      - name: نصب نیازمندی‌های پروژه
        run: |
          cd /tmp/downloader
          
          echo "📄 فایل requirements.txt:"
          if [ -f "requirements.txt" ]; then
            cat requirements.txt
          else
            echo "فایل requirements.txt وجود ندارد"
          fi
          
          echo ""
          echo "📦 نصب کتابخانه‌های مورد نیاز..."
          
          # نصب selectolax با روش صحیح
          pip install selectolax
          
          # نصب سایر نیازمندی‌ها
          pip install aiohttp beautifulsoup4 cloudscraper requests lxml
          
          echo ""
          echo "✅ کتابخانه‌های نصب شده:"
          pip list | grep -E "selectolax|aiohttp|beautifulsoup4|cloudscraper|lxml"

      - name: بررسی آمادگی پروژه
        run: |
          cd /tmp/downloader
          
          echo "🔍 تست import کتابخانه‌ها:"
          python3 -c "
          try:
              import selectolax
              print('✅ selectolax')
          except ImportError as e:
              print(f'❌ selectolax: {e}')
          
          try:
              import aiohttp
              print('✅ aiohttp')
          except ImportError as e:
              print(f'❌ aiohttp: {e}')
          
          try:
              from bs4 import BeautifulSoup
              print('✅ beautifulsoup4')
          except ImportError as e:
              print(f'❌ beautifulsoup4: {e}')
          "
          
          echo ""
          echo "📁 handlerهای موجود:"
          ls -la /tmp/downloader/downloader/

      - name: اجرای استخراج لینک
        id: extract
        run: |
          # ایجاد فایل links.txt
          echo "${{ github.event.inputs.urls }}" | tr ' ' '\n' | sed '/^$/d' > /tmp/downloader/links.txt
          
          echo "📝 لینک‌های ورودی:"
          cat /tmp/downloader/links.txt
          echo ""
          
          # اجرای process.py
          echo "🔄 در حال استخراج لینک‌های مستقیم..."
          cd /tmp/downloader
          python3 process.py 2>&1 | tee /tmp/process_log.txt
          
          echo ""
          echo "📊 نتیجه:"
          
          if [ -f "links_output.txt" ] && [ -s "links_output.txt" ]; then
            echo "✅ استخراج موفقیت‌آمیز بود!"
            echo ""
            echo "🎯 لینک‌های مستقیم:"
            echo "═══════════════════════════════════════"
            cat links_output.txt
            echo "═══════════════════════════════════════"
            cp links_output.txt /tmp/links_output.txt
          else
            echo "❌ استخراج ناموفق بود"
            
            if [ -f "links_output.txt" ]; then
              echo "فایل links_output.txt خالی است"
            fi
            
            echo ""
            echo "📋 لاگ خطاها:"
            grep -i "error\|exception\|traceback" /tmp/process_log.txt || echo "خطای خاصی یافت نشد"
          fi

      - name: نمایش نتایج نهایی
        run: |
          echo ""
          echo "🎯 =========================================="
          echo "🎯     لینک‌های مستقیم استخراج شده"
          echo "🎯 =========================================="
          echo ""
          
          if [ -f "/tmp/links_output.txt" ] && [ -s "/tmp/links_output.txt" ]; then
            LINK_COUNT=0
            while IFS= read -r line; do
              [ -z "$line" ] && continue
              LINK_COUNT=$((LINK_COUNT + 1))
              echo "$LINK_COUNT. $line"
            done < "/tmp/links_output.txt"
            
            echo ""
            echo "📊 تعداد لینک‌ها: $LINK_COUNT"
            echo ""
            echo "✅ می‌توانید از این لینک‌ها برای دانلود مستقیم استفاده کنید"
            
          else
            echo "❌ لینکی استخراج نشد"
            echo ""
            echo "📋 لاگ پردازش:"
            cat /tmp/process_log.txt
          fi

      - name: ذخیره خروجی
        uses: actions/upload-artifact@v4
        with:
          name: direct-links
          path: |
            /tmp/links_output.txt
            /tmp/process_log.txt
          retention-days: 7
        if: always()
