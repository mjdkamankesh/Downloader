      - name: استخراج و دانلود
        run: |
          URLS="${{ github.event.inputs.urls }}"
          SERVER_CHOICE="${{ github.event.inputs.server }}"
          MODE="${{ github.event.inputs.mode }}"
          ZIP_PASSWORD="${{ github.event.inputs.password }}"
          
          SPLIT_SIZE=45
          BACKUP_DIR="/tmp/dl_$$"
          mkdir -p "$BACKUP_DIR" downloads tmp_downloads
          
          for URL in $URLS; do
            echo "🔍 پردازش: $URL"
            echo ""
            
            # استخراج لینک دانلود با نمایش لاگ
            echo "📋 اجرای اسکریپت استخراج..."
            OUTPUT=$(python3 /tmp/bh_extractor.py "$URL" 2>&1)
            EXIT_CODE=$?
            
            echo "کد خروج اسکریپت: $EXIT_CODE"
            echo "خروجی اسکریپت:"
            echo "$OUTPUT"
            echo ""
            
            if [ $EXIT_CODE -ne 0 ]; then
              echo "❌ اسکریپت با خطا مواجه شد"
              cat /tmp/bh_error.log 2>/dev/null
              continue
            fi
            
            # استخراج نام فایل
            FILENAME=$(echo "$OUTPUT" | grep "^FILENAME:" | cut -d':' -f2-)
            if [ -z "$FILENAME" ]; then
              echo "⚠️ نام فایل پیدا نشد - استفاده از نام پیش‌فرض"
              FILENAME="download_$(date +%s)"
            fi
            echo "📁 نام فایل: $FILENAME"
            
            # استخراج لینک‌های دانلود
            echo ""
            echo "🔗 لینک‌های دانلود موجود:"
            echo "$OUTPUT" | grep "^DOWNLOAD_URL:"
            echo ""
            
            # انتخاب سرور
            if [ "$SERVER_CHOICE" = "all" ]; then
              DOWNLOAD_URLS=$(echo "$OUTPUT" | grep "^DOWNLOAD_URL:" | cut -d':' -f2-)
            elif [ "$SERVER_CHOICE" = "2" ]; then
              # پیدا کردن سرور 2
              SERVER2_LINE=$(echo "$OUTPUT" | grep -n "SERVER:2" | head -1 | cut -d: -f1)
              if [ -n "$SERVER2_LINE" ]; then
                # لینک دانلود قبل از خط SERVER:2
                PREV_LINE=$((SERVER2_LINE - 1))
                DOWNLOAD_URLS=$(echo "$OUTPUT" | sed -n "${PREV_LINE}p" | grep "^DOWNLOAD_URL:" | cut -d':' -f2-)
              fi
              
              if [ -z "$DOWNLOAD_URLS" ]; then
                echo "⚠️ سرور 2 در دسترس نیست - استفاده از سرور 1"
                DOWNLOAD_URLS=$(echo "$OUTPUT" | grep "^DOWNLOAD_URL:" | head -1 | cut -d':' -f2-)
              fi
            else
              # پیش‌فرض سرور 1
              DOWNLOAD_URLS=$(echo "$OUTPUT" | grep "^DOWNLOAD_URL:" | head -1 | cut -d':' -f2-)
            fi
            
            if [ -z "$DOWNLOAD_URLS" ]; then
              echo "❌ هیچ لینک دانلودی پیدا نشد"
              continue
            fi
            
            echo "🎯 لینک(های) انتخاب شده:"
            echo "$DOWNLOAD_URLS"
            echo ""
            
            # دانلود
            DL_COUNT=0
            echo "$DOWNLOAD_URLS" | while IFS= read -r DL_URL; do
              [ -z "$DL_URL" ] && continue
              DL_COUNT=$((DL_COUNT + 1))
              
              # URL encode کردن کاراکترهای خاص
              DL_URL=$(echo "$DL_URL" | sed 's/&amp;/\&/g')
              
              if [ "$SERVER_CHOICE" = "all" ] && [ $DL_COUNT -gt 1 ]; then
                SAVE_NAME="server${DL_COUNT}_${FILENAME}"
              else
                SAVE_NAME="$FILENAME"
              fi
              
              echo "⏬ [$DL_COUNT] دانلود: $SAVE_NAME"
              echo "🔗 URL: $DL_URL"
              
              # تلاش با aria2
              if aria2c \
                --split=8 \
                --max-connection-per-server=8 \
                --min-split-size=20M \
                --max-tries=5 \
                --retry-wait=5 \
                --timeout=120 \
                --connect-timeout=30 \
                --allow-overwrite=true \
                --auto-file-renaming=false \
                --dir="tmp_downloads" \
                --out="$SAVE_NAME" \
                "$DL_URL" 2>&1; then
                echo "✅ aria2 موفق"
              else
                echo "⚠️ aria2 ناموفق - استفاده از curl"
                if curl -L -# \
                  --retry 3 \
                  --retry-delay 5 \
                  --connect-timeout 30 \
                  --max-time 7200 \
                  -A "Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36" \
                  -H "Referer: $URL" \
                  -o "tmp_downloads/$SAVE_NAME" \
                  "$DL_URL" 2>&1; then
                  echo "✅ curl موفق"
                else
                  echo "❌ دانلود ناموفق"
                fi
              fi
              echo ""
            done
          done
          
          # ادامه پردازش...
          echo "📊 فایل‌های دانلود شده:"
          ls -lh tmp_downloads/ 2>/dev/null || echo "هیچ فایلی دانلود نشد"
          
          if [ -z "$(ls -A tmp_downloads 2>/dev/null)" ]; then
            echo "❌ فایلی برای بسته‌بندی وجود ندارد"
            exit 1
          fi
          
          echo "📦 بسته‌بندی فایل‌ها..."
          
          if [ "$MODE" = "zip" ]; then
            ARCHIVE_NAME="buzzheavier_$(date +%Y%m%d_%H%M%S)"
            mkdir -p "$BACKUP_DIR/$ARCHIVE_NAME"
            
            if [ -n "$ZIP_PASSWORD" ]; then
              zip -j -P "$ZIP_PASSWORD" -s ${SPLIT_SIZE}m \
                "$BACKUP_DIR/$ARCHIVE_NAME/${ARCHIVE_NAME}.zip" \
                tmp_downloads/*
            else
              zip -j -s ${SPLIT_SIZE}m \
                "$BACKUP_DIR/$ARCHIVE_NAME/${ARCHIVE_NAME}.zip" \
                tmp_downloads/*
            fi
            
            echo "# $ARCHIVE_NAME" > "$BACKUP_DIR/$ARCHIVE_NAME/README.md"
            for f in tmp_downloads/*; do
              [ -f "$f" ] || continue
              SIZE=$(du -h "$f" | cut -f1)
              echo "- $(basename "$f") ($SIZE)" >> "$BACKUP_DIR/$ARCHIVE_NAME/README.md"
            done
          else
            for FILE in tmp_downloads/*; do
              [ -f "$FILE" ] || continue
              
              BASENAME=$(basename "$FILE")
              SIZE=$(stat -c%s "$FILE")
              SIZE_MB=$((SIZE / 1024 / 1024))
              
              FOLDER="${BASENAME%.*}_$(date +%s)"
              mkdir -p "$BACKUP_DIR/$FOLDER"
              
              if [ "$SIZE" -gt $((SPLIT_SIZE * 1024 * 1024)) ]; then
                if [ -n "$ZIP_PASSWORD" ]; then
                  zip -j -P "$ZIP_PASSWORD" -s ${SPLIT_SIZE}m \
                    "$BACKUP_DIR/$FOLDER/${FOLDER}.zip" "$FILE"
                else
                  zip -j -s ${SPLIT_SIZE}m \
                    "$BACKUP_DIR/$FOLDER/${FOLDER}.zip" "$FILE"
                fi
              else
                if [ -n "$ZIP_PASSWORD" ]; then
                  zip -j -P "$ZIP_PASSWORD" \
                    "$BACKUP_DIR/$FOLDER/${FOLDER}.zip" "$FILE"
                else
                  zip -j "$BACKUP_DIR/$FOLDER/${FOLDER}.zip" "$FILE"
                fi
              fi
              
              echo "# $BASENAME (${SIZE_MB}MB)" > "$BACKUP_DIR/$FOLDER/README.md"
            done
          fi
          
          cp -r "$BACKUP_DIR"/* downloads/ 2>/dev/null
          echo "✅ عملیات کامل شد"
