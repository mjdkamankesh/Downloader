name: ⬇️ دانلود از BuzzHeavier

on:
  workflow_dispatch:
    inputs:
      urls:
        description: '🔗 لینک‌های BuzzHeavier (با فاصله جدا کنید)'
        required: true
        type: string
      mode:
        description: '📦 حالت دانلود'
        required: false
        default: 'normal'
        type: choice
        options:
          - normal
          - zip
      password:
        description: '🔒 رمز عبور برای فایل زیپ (اختیاری)'
        required: false
        default: ''
        type: string

jobs:
  download:
    runs-on: ubuntu-latest
    timeout-minutes: 120
    permissions:
      contents: write
    steps:
      - name: بررسی لینک ورودی
        run: |
          if [ -z "${{ github.event.inputs.urls }}" ]; then
            echo "❌ لینک دانلود وارد نشده است!"
            exit 1
          fi
          echo "✅ لینک‌های دانلود دریافت شد"

      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: نصب پیش‌نیازها
        run: |
          sudo apt-get update
          sudo apt-get install -y aria2 zip curl bc python3 python3-pip
          pip3 install requests beautifulsoup4 tqdm

      - name: آماده‌سازی اسکریپت BuzzHeavier
        run: |
          cat > bhdownload.py << 'PYEOF'
          import requests
          from bs4 import BeautifulSoup
          import sys
          import re
          from urllib.parse import urlparse
          import os

          def get_direct_link(url_or_id):
              # استخراج ID از URL
              if '/' in url_or_id:
                  url_or_id = url_or_id.rstrip('/').split('/')[-1]
              
              # حذف پارامترهای اضافی
              url_or_id = url_or_id.split('?')[0].split('#')[0]
              
              if len(url_or_id) != 12:
                  print(f"Error: Invalid ID length: {url_or_id}", file=sys.stderr)
                  return None, None
              
              url = f"https://buzzheavier.com/{url_or_id}"
              
              headers = {
                  'User-Agent': 'Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36'
              }
              
              try:
                  response = requests.get(url, headers=headers, timeout=30)
                  response.raise_for_status()
                  
                  soup = BeautifulSoup(response.text, 'html.parser')
                  
                  # استخراج نام فایل
                  title_tag = soup.find('title')
                  filename = None
                  if title_tag:
                      filename = title_tag.text.strip()
                  
                  # جستجوی لینک دانلود مستقیم
                  download_link = None
                  for script in soup.find_all('script'):
                      if script.string:
                          # جستجوی الگوی دانلود
                          match = re.search(r'"(https?://[^"]+)"', script.string)
                          if match:
                              link = match.group(1)
                              if 'download' in link.lower() or 'cdn' in link.lower():
                                  download_link = link
                                  break
                  
                  # روش دوم: جستجوی لینک در صفحه
                  if not download_link:
                      for a in soup.find_all('a', href=True):
                          href = a['href']
                          if url_or_id in href and ('download' in href.lower() or 'cdn' in href.lower()):
                              download_link = href
                              break
                  
                  # روش سوم: استفاده از API
                  if not download_link:
                      api_url = f"https://buzzheavier.com/api/download/{url_or_id}"
                      api_response = requests.get(api_url, headers=headers, timeout=30)
                      if api_response.status_code == 200:
                          data = api_response.json()
                          if 'url' in data:
                              download_link = data['url']
                              if 'name' in data and not filename:
                                  filename = data['name']
                  
                  if download_link:
                      print(f"[DEBUG] Title: {filename}", file=sys.stderr)
                      print(f"[DEBUG] Download link: {download_link}", file=sys.stderr)
                      return download_link, filename
                  
                  print(f"Error: Download link not found for {url_or_id}", file=sys.stderr)
                  return None, filename
                  
              except Exception as e:
                  print(f"Error: {str(e)}", file=sys.stderr)
                  return None, None

          if __name__ == "__main__":
              if len(sys.argv) < 2:
                  print("Usage: python3 bhdownload.py <id_or_url>")
                  sys.exit(1)
              
              input_arg = sys.argv[1]
              
              # حذف / از انتهای URL اگر وجود داشته باشد
              input_arg = input_arg.rstrip('/')
              
              # اگر از فایل ورودی استفاده می‌شود
              if input_arg == '-f' and len(sys.argv) > 2:
                  with open(sys.argv[2], 'r') as f:
                      for line in f:
                          line = line.strip()
                          if line:
                              download_link, filename = get_direct_link(line)
                              if download_link:
                                  print(download_link)
              else:
                  download_link, filename = get_direct_link(input_arg)
                  if download_link:
                      print(download_link)
          PYEOF
          
          chmod +x bhdownload.py

      - name: تنظیمات گیت
        run: |
          git config --global http.postBuffer 524288000
          git config --global http.maxRequestBuffer 100M
          git config --global core.compression 0
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"

      - name: دانلود فایل‌ها
        run: |
          MODE="${{ github.event.inputs.mode }}"
          URLS="${{ github.event.inputs.urls }}"
          ZIP_PASSWORD="${{ github.event.inputs.password }}"
          
          SPLIT_THRESHOLD_MB=45
          BACKUP_DIR="/tmp/download_backup_$$"
          mkdir -p "$BACKUP_DIR"
          mkdir -p downloads tmp_downloads
          
          echo "📥 شروع دانلود از BuzzHeavier..."
          
          # پردازش هر لینک
          for URL in $URLS; do
            echo "🔍 پردازش لینک: $URL"
            
            # دریافت لینک مستقیم با اسکریپت
            DIRECT_LINK=$(python3 bhdownload.py "$URL" 2>/tmp/bh_error.log)
            
            if [ -n "$DIRECT_LINK" ]; then
              # استخراج نام فایل از لاگ
              FILENAME=$(grep "Title:" /tmp/bh_error.log | cut -d' ' -f2-)
              if [ -z "$FILENAME" ]; then
                FILENAME=$(basename "$DIRECT_LINK" | sed 's/[?#].*//')
              fi
              FILENAME=$(echo "$FILENAME" | sed 's/[<>:"|?*]/_/g')
              
              echo "📁 دانلود: $FILENAME"
              echo "🔗 لینک مستقیم: $DIRECT_LINK"
              
              # دانلود با aria2
              aria2c \
                --split=4 \
                --max-connection-per-server=4 \
                --min-split-size=20M \
                --max-tries=5 \
                --retry-wait=5 \
                --timeout=60 \
                --connect-timeout=30 \
                --allow-overwrite=true \
                --auto-file-renaming=false \
                --dir="tmp_downloads" \
                --out="$FILENAME" \
                "$DIRECT_LINK" 2>&1 || {
                  echo "⚠️ دانلود با aria2 ناموفق بود، استفاده از curl..."
                  curl -L -f -# \
                    --retry 3 \
                    --retry-delay 5 \
                    --connect-timeout 30 \
                    --max-time 3600 \
                    -A "Mozilla/5.0" \
                    -o "tmp_downloads/$FILENAME" \
                    "$DIRECT_LINK"
                }
            else
              echo "❌ خطا در دریافت لینک مستقیم برای: $URL"
              cat /tmp/bh_error.log
            fi
          done
          
          # پردازش فایل‌های دانلود شده
          echo "📦 پردازش فایل‌های دانلود شده..."
          
          if [ "$MODE" = "zip" ]; then
            # حالت zip: همه فایل‌ها در یک آرشیو
            if [ -n "$(ls -A tmp_downloads 2>/dev/null)" ]; then
              ARCHIVE_NAME="buzzheavier_$(date +%Y%m%d_%H%M%S)"
              FOLDER_NAME="${ARCHIVE_NAME}"
              mkdir -p "$BACKUP_DIR/$FOLDER_NAME"
              
              if [ -n "$ZIP_PASSWORD" ]; then
                zip -j -P "${ZIP_PASSWORD}" -s ${SPLIT_THRESHOLD_MB}m \
                  "$BACKUP_DIR/$FOLDER_NAME/${ARCHIVE_NAME}.zip" \
                  tmp_downloads/*
              else
                zip -j -s ${SPLIT_THRESHOLD_MB}m \
                  "$BACKUP_DIR/$FOLDER_NAME/${ARCHIVE_NAME}.zip" \
                  tmp_downloads/*
              fi
              
              # ایجاد README
              {
                echo "# 📦 $ARCHIVE_NAME"
                echo ""
                echo "## فایل‌های دانلود شده از BuzzHeavier"
                echo ""
                echo "| # | نام فایل |"
                echo "|---|----------|"
                for f in tmp_downloads/*; do
                  echo "| | $(basename "$f") |"
                done
              } > "$BACKUP_DIR/$FOLDER_NAME/README.md"
            fi
          else
            # حالت normal: هر فایل جداگانه
            for FILE in tmp_downloads/*; do
              [ -f "$FILE" ] || continue
              
              BASENAME=$(basename "$FILE")
              SIZE=$(stat -c%s "$FILE")
              SIZE_MB=$((SIZE / 1024 / 1024))
              
              FOLDER_NAME="${BASENAME%.*}"
              mkdir -p "$BACKUP_DIR/$FOLDER_NAME"
              
              if [ "$SIZE" -gt $((SPLIT_THRESHOLD_MB * 1024 * 1024)) ]; then
                echo "📦 فایل بزرگ ($SIZE_MB MB) - تقسیم به بخش‌های ${SPLIT_THRESHOLD_MB}MB"
                if [ -n "$ZIP_PASSWORD" ]; then
                  zip -j -P "${ZIP_PASSWORD}" -s ${SPLIT_THRESHOLD_MB}m \
                    "$BACKUP_DIR/$FOLDER_NAME/${FOLDER_NAME}.zip" "$FILE"
                else
                  zip -j -s ${SPLIT_THRESHOLD_MB}m \
                    "$BACKUP_DIR/$FOLDER_NAME/${FOLDER_NAME}.zip" "$FILE"
                fi
              else
                echo "📦 فایل کوچک ($SIZE_MB MB) - ایجاد آرشیو"
                if [ -n "$ZIP_PASSWORD" ]; then
                  zip -j -P "${ZIP_PASSWORD}" \
                    "$BACKUP_DIR/$FOLDER_NAME/${FOLDER_NAME}.zip" "$FILE"
                else
                  zip -j "$BACKUP_DIR/$FOLDER_NAME/${FOLDER_NAME}.zip" "$FILE"
                fi
              fi
              
              # ایجاد README برای هر فایل
              REPO_URL="${{ github.server_url }}/${{ github.repository }}/tree/${{ github.ref_name }}/downloads"
              {
                echo "# 📁 $BASENAME"
                echo ""
                echo "| مشخصات | مقدار |"
                echo "|--------|-------|"
                echo "| **نام فایل** | $BASENAME |"
                echo "| **حجم** | ${SIZE_MB}MB |"
                echo "| **منبع** | BuzzHeavier |"
                echo ""
                echo "## لینک دانلود"
                echo "[📥 دانلود از گیتهاب]($REPO_URL/$(python3 -c "import urllib.parse; print(urllib.parse.quote('$FOLDER_NAME'))"))"
              } > "$BACKUP_DIR/$FOLDER_NAME/README.md"
            done
          fi
          
          # کپی به پوشه downloads
          cp -r "$BACKUP_DIR"/* downloads/ 2>/dev/null || true
          
          echo "✅ دانلود و پردازش کامل شد"
          
          # ذخیره مسیر برای استفاده در مراحل بعدی
          echo "$BACKUP_DIR" > /tmp/backup_dir_path.txt

      - name: بروزرسانی README
        run: |
          {
            echo "# 📥 فایل‌های دانلود شده از BuzzHeavier"
            echo ""
            echo "## لیست فایل‌ها"
            echo ""
            for folder in downloads/*/; do
              if [ -d "$folder" ]; then
                FOLDER_NAME=$(basename "$folder")
                echo "- [📁 $FOLDER_NAME](./$FOLDER_NAME)"
              fi
            done
            echo ""
            echo "---"
            echo "📅 آخرین بروزرسانی: $(date '+%Y-%m-%d %H:%M:%S')"
          } > "downloads/README.md"

      - name: آپلود در گیتهاب
        run: |
          git add -f downloads/
          git add README.md 2>/dev/null || true
          
          if ! git diff --cached --quiet; then
            git commit -m "📥 آپلود فایل‌های BuzzHeavier [skip ci]"
            
            for i in {1..5}; do
              if git push origin "${GITHUB_REF_NAME}"; then
                echo "✅ آپلود موفقیت‌آمیز بود"
                exit 0
              fi
              echo "🔄 تلاش مجدد $i/5..."
              sleep 5
            done
            echo "❌ خطا در آپلود"
          else
            echo "ℹ️ فایلی برای آپلود وجود ندارد"
          fi
