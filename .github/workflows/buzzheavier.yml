name: 🔗 استخراج لینک مستقیم با Download URL Generator

on:
  workflow_dispatch:
    inputs:
      urls:
        description: '🔗 لینک‌ها (با فاصله یا خط جدید جدا کنید)'
        required: true
        type: string

jobs:
  extract-links:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    
    steps:
      - name: نمایش لینک‌های ورودی
        run: |
          echo "📋 لینک‌های ورودی:"
          echo "${{ github.event.inputs.urls }}"
          echo ""

      - name: Checkout
        uses: actions/checkout@v4

      - name: نصب Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: کلون Download URL Generator
        run: |
          git clone https://github.com/Ryas-Yusenda/Download-URL-Generator.git /tmp/downloader
          echo "✅ مخزن کلون شد"
          
          # نمایش ساختار
          echo "📁 ساختار پروژه:"
          ls -la /tmp/downloader/

      - name: نصب نیازمندی‌ها
        run: |
          cd /tmp/downloader
          if [ -f "requirements.txt" ]; then
            pip install -r requirements.txt
          fi
          # نصب کتابخانه‌های اضافی که ممکن است نیاز باشد
          pip install aiohttp beautifulsoup4 cloudscraper requests
          echo "✅ نیازمندی‌ها نصب شدند"

      - name: آماده‌سازی و اجرای استخراج
        id: extract
        run: |
          # ایجاد فایل links.txt
          echo "${{ github.event.inputs.urls }}" | tr ' ' '\n' | sed '/^$/d' > /tmp/downloader/links.txt
          
          echo "📝 محتوای links.txt:"
          cat /tmp/downloader/links.txt
          echo ""
          
          # اجرای process.py
          echo "🔄 در حال استخراج لینک‌های مستقیم..."
          cd /tmp/downloader
          python3 process.py 2>&1 | tee /tmp/process_log.txt
          EXIT_CODE=$?
          
          echo ""
          echo "📊 کد خروج: $EXIT_CODE"
          
          if [ -f "links_output.txt" ]; then
            echo "✅ فایل links_output.txt ایجاد شد"
            echo "محتوای خروجی:"
            echo "═══════════════════════════════════════"
            cat links_output.txt
            echo "═══════════════════════════════════════"
            
            # ذخیره محتوا برای مرحله بعد
            cp links_output.txt /tmp/links_output.txt
            
            echo "EXTRACTION_SUCCESS=true" >> $GITHUB_OUTPUT
          else
            echo "❌ فایل links_output.txt ایجاد نشد"
            echo "EXTRACTION_SUCCESS=false" >> $GITHUB_OUTPUT
          fi

      - name: پردازش و نمایش نهایی
        run: |
          echo ""
          echo "🎯 =========================================="
          echo "🎯     لینک‌های مستقیم استخراج شده"
          echo "🎯 =========================================="
          echo ""
          
          if [ -f "/tmp/links_output.txt" ] && [ -s "/tmp/links_output.txt" ]; then
            # خواندن و پردازش فایل خروجی
            LINK_COUNT=0
            while IFS= read -r line; do
              if [ -z "$line" ]; then
                continue
              fi
              
              LINK_COUNT=$((LINK_COUNT + 1))
              
              # بررسی اگر خط شامل URL است
              if [[ "$line" =~ ^https?:// ]]; then
                echo "$LINK_COUNT. $line"
              else
                # سعی در استخراج URL از خط
                URL=$(echo "$line" | grep -oP 'https?://[^\s"'\'']+' | head -1)
                if [ -n "$URL" ]; then
                  echo "$LINK_COUNT. $URL"
                else
                  echo "$LINK_COUNT. $line (فرمت نامشخص)"
                fi
              fi
            done < "/tmp/links_output.txt"
            
            echo ""
            echo "📊 تعداد لینک‌های استخراج شده: $LINK_COUNT"
            
          elif [ -f "/tmp/downloader/links_output.txt" ] && [ -s "/tmp/downloader/links_output.txt" ]; then
            echo "محتوای فایل خروجی:"
            cat /tmp/downloader/links_output.txt
          else
            echo "⚠️ هیچ لینکی استخراج نشد"
            echo ""
            echo "📋 لاگ پردازش:"
            cat /tmp/process_log.txt
            
            echo ""
            echo "💡 راهنمایی:"
            echo "- مطمئن شوید لینک‌ها معتبر و قابل دسترسی هستند"
            echo "- فایل ممکن است پاک شده باشد"
            echo "- سایت ممکن است مسدود یا نیاز به احراز هویت داشته باشد"
          fi

      - name: ذخیره خروجی به عنوان آرتیفکت
        uses: actions/upload-artifact@v4
        with:
          name: extracted-links
          path: |
            /tmp/links_output.txt
            /tmp/process_log.txt
          retention-days: 7
