name: 🔗 استخراج لینک مستقیم با Download URL Generator

on:
  workflow_dispatch:
    inputs:
      urls:
        description: '🔗 لینک‌ها (با فاصله یا خط جدید جدا کنید)'
        required: true
        type: string

jobs:
  extract-links:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    
    steps:
      - name: نمایش لینک‌های ورودی
        run: |
          echo "📋 لینک‌های ورودی:"
          echo "${{ github.event.inputs.urls }}"
          echo ""

      - name: Checkout
        uses: actions/checkout@v4

      - name: نصب Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: کلون Download URL Generator
        run: |
          git clone https://github.com/Ryas-Yusenda/Download-URL-Generator.git /tmp/downloader
          echo "✅ مخزن کلون شد"
          
          echo "📁 ساختار پروژه:"
          find /tmp/downloader -type f -name "*.py" -o -name "*.txt" -o -name "*.md" | sort

      - name: بررسی و نصب نیازمندی‌ها
        run: |
          cd /tmp/downloader
          
          # نمایش محتوای requirements.txt اگر وجود دارد
          if [ -f "requirements.txt" ]; then
            echo "📄 محتوای requirements.txt:"
            cat requirements.txt
          fi
          
          # بررسی importهای مورد نیاز در کد
          echo ""
          echo "🔍 بررسی کتابخانه‌های مورد نیاز..."
          IMPORTS=$(grep -rh "^from\|^import" downloader/ process.py 2>/dev/null | grep -v "from \." | sort -u)
          echo "$IMPORTS"
          
          # نصب کتابخانه‌های ضروری
          pip install aiohttp beautifulsoup4 cloudscraper requests lxml
          
          # نصب selectolax (ممکن است نیاز به کامپایل داشته باشد)
          pip install selectolax || {
            echo "⚠️ selectolax از PyPI نصب نشد"
            # تلاش با pip3 و پیش‌نیازها
            sudo apt-get update
            sudo apt-get install -y python3-dev build-essential
            pip install --no-cache-dir selectolax || {
              echo "⚠️ نصب selectolax ناموفق - تلاش با نسخه wheel"
              pip install selectolax-py3 || echo "❌ selectolax نصب نشد"
            }
          }
          
          echo ""
          echo "✅ کتابخانه‌های نصب شده:"
          pip list | grep -E "aiohttp|beautifulsoup4|cloudscraper|selectolax|lxml|requests"

      - name: رفع مشکل selectolax (در صورت نیاز)
        run: |
          cd /tmp/downloader
          
          # بررسی فایل‌های handler
          echo "📁 فایل‌های handler:"
          ls -la downloader/
          
          # اگر selectolax نصب نشد، فایل fuckingfast.py را اصلاح کن
          if ! python3 -c "import selectolax" 2>/dev/null; then
            echo ""
            echo "⚠️ selectolax در دسترس نیست - اصلاح handler fuckingfast..."
            
            if [ -f "downloader/fuckingfast.py" ]; then
              # بکاپ از فایل اصلی
              cp downloader/fuckingfast.py downloader/fuckingfast.py.bak
              
              # جایگزینی selectolax با beautifulsoup4
              sed -i 's/from selectolax.parser import HTMLParser/from bs4 import BeautifulSoup as HTMLParser/' downloader/fuckingfast.py
              
              # اصلاح نحوه استفاده (اگر متفاوت باشد)
              # این بستگی به پیاده‌سازی دارد - ممکن است نیاز به تغییرات بیشتری باشد
              
              echo "✅ فایل fuckingfast.py اصلاح شد"
              echo "محتوای اصلاح شده:"
              head -10 downloader/fuckingfast.py
            fi
          else
            echo "✅ selectolax با موفقیت نصب شده است"
          fi

      - name: آماده‌سازی و اجرای استخراج
        id: extract
        run: |
          # ایجاد فایل links.txt
          echo "${{ github.event.inputs.urls }}" | tr ' ' '\n' | sed '/^$/d' > /tmp/downloader/links.txt
          
          echo "📝 محتوای links.txt:"
          cat /tmp/downloader/links.txt
          echo ""
          
          # بررسی ساختار process.py
          echo "📄 محتوای process.py:"
          head -30 /tmp/downloader/process.py
          echo "..."
          
          # اجرای process.py
          echo ""
          echo "🔄 در حال استخراج لینک‌های مستقیم..."
          cd /tmp/downloader
          
          # اجرا با نمایش کامل خطا
          python3 process.py 2>&1 | tee /tmp/process_log.txt
          EXIT_CODE=$?
          
          echo ""
          echo "📊 کد خروج: $EXIT_CODE"
          
          # بررسی فایل‌های خروجی
          echo ""
          echo "📁 فایل‌های موجود بعد از اجرا:"
          ls -la *.txt 2>/dev/null || echo "فایل txt یافت نشد"
          
          if [ -f "links_output.txt" ] && [ -s "links_output.txt" ]; then
            echo ""
            echo "✅ فایل links_output.txt ایجاد شد"
            echo "محتوای خروجی:"
            echo "═══════════════════════════════════════"
            cat links_output.txt
            echo "═══════════════════════════════════════"
            cp links_output.txt /tmp/links_output.txt
            echo "EXTRACTION_SUCCESS=true" >> $GITHUB_OUTPUT
          else
            echo ""
            echo "❌ فایل links_output.txt ایجاد نشد یا خالی است"
            
            # اگر فایل خالی است، شاید handler خاصی برای BuzzHeavier نیاز باشد
            if [ -f "links_output.txt" ]; then
              echo "فایل خالی است"
            fi
            
            echo "EXTRACTION_SUCCESS=false" >> $GITHUB_OUTPUT
          fi

      - name: نمایش نتایج نهایی
        run: |
          echo ""
          echo "🎯 =========================================="
          echo "🎯     لینک‌های مستقیم استخراج شده"
          echo "🎯 =========================================="
          echo ""
          
          if [ -f "/tmp/links_output.txt" ] && [ -s "/tmp/links_output.txt" ]; then
            LINK_COUNT=0
            while IFS= read -r line; do
              [ -z "$line" ] && continue
              LINK_COUNT=$((LINK_COUNT + 1))
              
              if [[ "$line" =~ ^https?:// ]]; then
                echo "$LINK_COUNT. ✅ $line"
              else
                URL=$(echo "$line" | grep -oP 'https?://[^\s"'"'"']+' | head -1)
                if [ -n "$URL" ]; then
                  echo "$LINK_COUNT. ✅ $URL"
                else
                  echo "$LINK_COUNT. ⚠️ $line"
                fi
              fi
            done < "/tmp/links_output.txt"
            
            echo ""
            echo "📊 تعداد لینک‌های استخراج شده: $LINK_COUNT"
            
          else
            echo "⚠️ هیچ لینکی استخراج نشد"
            echo ""
            echo "📋 لاگ کامل اجرا:"
            echo "──────────────────────────────────────"
            cat /tmp/process_log.txt
            
            echo ""
            echo "🔍 عیب‌یابی:"
            echo "1. بررسی handlerهای موجود:"
            ls -la /tmp/downloader/downloader/
            
            echo ""
            echo "2. آیا handler برای BuzzHeavier وجود دارد؟"
            find /tmp/downloader -name "*buzz*" -o -name "*heavier*" 2>/dev/null || echo "❌ handler برای BuzzHeavier پیدا نشد"
            
            echo ""
            echo "💡 ممکن است این ابزار handler برای BuzzHeavier نداشته باشد"
            echo "لینک‌های پشتیبانی شده در readme: fuckingfast, mediafire, pixeldrain"
          fi

      - name: ذخیره خروجی به عنوان آرتیفکت
        uses: actions/upload-artifact@v4
        with:
          name: extracted-links
          path: |
            /tmp/links_output.txt
            /tmp/process_log.txt
            /tmp/downloader/links.txt
          retention-days: 7
        if: always()
