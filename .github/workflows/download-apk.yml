name: Download eFootball 10.4.2

on:
  workflow_dispatch:

jobs:
  download:
    runs-on: ubuntu-latest
    
    steps:
      - name: Download using gh-apkmirror-dl
        uses: Yakov5776/gh-apkmirror-dl@v1.3
        with:
          org: "konami"
          repo: "pes2017-pro-evolution-soccer"
          version: "10.4.2"
          arch: "arm64-v8a"
          dpi: "nodpi"
          bundle: "false"
          filename: "efootball.apk"
          
      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: efootball-10.4.2
          path: efootball.apk
