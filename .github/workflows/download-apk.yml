name: Download eFootball

on:
  workflow_dispatch:

jobs:
  download:
    runs-on: ubuntu-latest
    
    steps:
      - name: Download APKMD
        run: |
          wget https://github.com/tanishqmanuja/apkmirror-downloader/releases/download/v2.0.10/apkmd
          chmod +x apkmd
          
      - name: Create config
        run: |
          echo '{"options":{"arch":"arm64-v8a","outDir":"downloads"},"apps":[{"org":"konami","repo":"pes2017-pro-evolution-soccer","outFile":"efootball","version":"10.4.2"}]}' > apps.json
          
      - name: Download
        run: ./apkmd apps.json
        
      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: efootball
          path: downloads/efootball.apk
