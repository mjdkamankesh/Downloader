name: Download eFootball 10.4.2

on:
  workflow_dispatch:

jobs:
  download:
    runs-on: windows-latest
    
    steps:
      - name: Download APKMD
        run: |
          curl -L -o apkmd.exe https://github.com/tanishqmanuja/apkmirror-downloader/releases/download/v2.0.10/apkmd-win.exe
      
      - name: Create config
        run: |
          echo '{"options":{"arch":"arm64-v8a","outDir":"downloads"},"apps":[{"org":"konami","repo":"pes2017-pro-evolution-soccer","outFile":"efootball","version":"10.4.2"}]}' > apps.json
      
      - name: Download
        run: ./apkmd.exe apps.json
      
      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: efootball-10.4.2
          path: downloads/efootball.apk
