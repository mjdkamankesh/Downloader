name: Download eFootball APK (Simple)

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'نسخه (خالی = آخرین نسخه)'
        required: false

jobs:
  download:
    runs-on: ubuntu-latest
    
    steps:
      - name: Download APK using gh-apkmirror-dl
        uses: Yakov5776/gh-apkmirror-dl@v1.3
        with:
          org: "konami"
          repo: "pes2017-pro-evolution-soccer"
          version: ${{ github.event.inputs.version }}
          arch: "arm64-v8a"
          dpi: "nodpi"
          bundle: "false"
          filename: "efootball.apk"
      
      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: efootball-apk
          path: efootball.apk
          retention-days: 30
