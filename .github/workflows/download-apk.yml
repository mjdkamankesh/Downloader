name: Download eFootball 10.4.2 with Linux

on:
  workflow_dispatch:

jobs:
  download:
    runs-on: ubuntu-latest
    
    steps:
      - name: Download APKMD Linux
        run: |
          wget https://github.com/tanishqmanuja/apkmirror-downloader/releases/download/v2.0.10/apkmd-linux
          chmod +x apkmd-linux
          sudo mv apkmd-linux /usr/local/bin/apkmd
          
      - name: Create config
        run: |
          cat > apps.json << 'EOF'
          {
            "options": {
              "arch": "arm64-v8a",
              "outDir": "downloads"
            },
            "apps": [
              {
                "org": "konami",
                "repo": "pes2017-pro-evolution-soccer",
                "outFile": "efootball",
                "version": "10.4.2"
              }
            ]
          }
          EOF
          
      - name: Download
        run: apkmd apps.json
        
      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: efootball-10.4.2
          path: downloads/efootball.apk
