name: Download eFootball APK from APKMirror

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'نسخه مورد نظر (خالی = آخرین نسخه)'
        required: false
        default: ''

jobs:
  download-efootball:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    
    steps:
      - name: Download eFootball APK
        uses: Yakov5776/gh-apkmirror-dl@v1.3
        id: download
        with:
          org: "konami"
          repo: "pes2017-pro-evolution-soccer"
          version: ${{ github.event.inputs.version }}
          arch: "arm64-v8a"
          dpi: "nodpi"
          bundle: "false"
          filename: "efootball.apk"
      
      - name: Upload APK as Artifact
        uses: actions/upload-artifact@v4
        with:
          name: efootball-apk
          path: efootball.apk
          retention-days: 7
      
      - name: Create Release (اختیاری)
        if: ${{ github.event.inputs.version != '' }}
        uses: softprops/action-gh-release@v1
        with:
          tag_name: efootball-v${{ github.event.inputs.version }}
          name: "eFootball v${{ github.event.inputs.version }}"
          files: efootball.apk
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
