name: Download eFootball via NPX

on:
  workflow_dispatch:

jobs:
  download:
    runs-on: ubuntu-latest
    
    steps:
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          
      - name: Download eFootball
        run: |
          npx apkmirror-downloader@2.0.10 download konami pes2017-pro-evolution-soccer \
            --arch arm64-v8a \
            --dpi nodpi \
            --version 10.4.2 \
            --outDir downloads \
            --outFile efootball.apk
            
      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: efootball-10.4.2
          path: downloads/efootball.apk
