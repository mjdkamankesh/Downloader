name: Download eFootball with WARP

on:
  workflow_dispatch:

jobs:
  download:
    runs-on: ubuntu-latest
    
    steps:
      - name: Start WARP
        run: |
          docker run -d --name warp --cap-add NET_ADMIN -p 1080:1080 caomingjun/warp
          sleep 15
          
      - name: Download
        uses: Yakov5776/gh-apkmirror-dl@v1.3
        with:
          org: "konami"
          repo: "pes2017-pro-evolution-soccer"
          version: "10.4.2"
          arch: "arm64-v8a"
          dpi: "nodpi"
          filename: "efootball.apk"
        env:
          https_proxy: socks5://127.0.0.1:1080
          http_proxy: socks5://127.0.0.1:1080
          
      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: efootball-10.4.2
          path: efootball.apk
          
      - name: Stop WARP
        if: always()
        run: docker stop warp || true
