name: Download eFootball with WARP

on:
  workflow_dispatch:

jobs:
  download:
    runs-on: ubuntu-latest
    
    steps:
      - name: Start WARP
        run: |
          docker run -d --name warp --cap-add NET_ADMIN -p 1080:1080 caomingjun/warp
          sleep 15
          
      - name: Setup
        run: |
          wget https://github.com/tanishqmanuja/apkmirror-downloader/releases/download/v2.0.10/apkmd
          chmod +x apkmd
          echo '{"options":{"arch":"arm64-v8a","outDir":"downloads"},"apps":[{"org":"konami","repo":"pes2017-pro-evolution-soccer","outFile":"efootball","version":"10.4.2"}]}' > apps.json
          
      - name: Download via WARP
        run: |
          export HTTP_PROXY=socks5://127.0.0.1:1080
          export HTTPS_PROXY=socks5://127.0.0.1:1080
          ./apkmd apps.json
          
      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: efootball
          path: downloads/efootball.apk
          
      - name: Stop WARP
        if: always()
        run: docker stop warp || true
