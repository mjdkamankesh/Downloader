name: Download with yt-dlp

on:
  workflow_dispatch:

jobs:
  yt-dlp-download:
    runs-on: ubuntu-latest
    
    steps:
      - name: Install yt-dlp
        run: |
          sudo apt-get update
          sudo apt-get install -y python3-pip
          pip3 install yt-dlp
          
      - name: Download eFootball
        run: |
          yt-dlp -f best --no-playlist \
            "https://www.apkmirror.com/apk/konami/pes2017-pro-evolution-soccer/efootball-10-4-2-release/" \
            -o "efootball.%(ext)s"
          
      - name: Check and upload
        run: |
          find . -name "*.apk" -type f
          if [ -f "efootball.apk" ]; then
            ls -lh efootball.apk
          fi
          
      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: efootball-10.4.2
          path: "*.apk"
