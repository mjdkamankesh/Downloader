name: Download eFootball with WARP

on:
  workflow_dispatch:

jobs:
  download:
    runs-on: ubuntu-latest
    
    steps:
      - name: Start WARP Container
        run: |
          docker run -d --name warp --cap-add NET_ADMIN -p 1080:1080 caomingjun/warp
          sleep 15
          
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          
      - name: Download with WARP proxy
        run: |
          export HTTP_PROXY=socks5://127.0.0.1:1080
          export HTTPS_PROXY=socks5://127.0.0.1:1080
          
          npx apkmirror-downloader@2.0.10 download konami pes2017-pro-evolution-soccer \
            --arch arm64-v8a \
            --dpi nodpi \
            --version 10.4.2 \
            --outDir downloads \
            --outFile efootball.apk
            
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: efootball-10.4.2
          path: downloads/efootball.apk
          
      - name: Stop WARP
        if: always()
        run: docker stop warp || true
