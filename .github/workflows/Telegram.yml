name: 📥 Telegram Chat Downloader (Hashtag Filter Only)

on:
  workflow_dispatch:
    inputs:
      api_id:
        description: '🔑 API ID'
        required: true
        type: string
      api_hash:
        description: '🔐 API HASH'
        required: true
        type: string
      string_session:
        description: '📱 String Session'
        required: true
        type: string
      chat_target:
        description: '🎯 هدف (برای Saved Messages: me)'
        required: true
        type: string
        default: 'me'
      hashtag_filter:
        description: '🏷️ هشتگ مورد نظر (مثال: ویپ_ایزابل یا SANS511) - خالی = همه'
        required: false
        type: string
        default: ''
      zip_password:
        description: '🔒 رمز فایل‌های زیپ (اختیاری)'
        required: false
        default: ''
        type: string

jobs:
  backup:
    runs-on: ubuntu-latest
    timeout-minutes: 360
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "actions@github.com"

      - uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - run: pip install telethon

      - name: Create script
        run: |
          cat > download.py << 'EOF'
          import os, re, asyncio
          from telethon import TelegramClient
          from telethon.sessions import StringSession

          API_ID = ${{ github.event.inputs.api_id }}
          API_HASH = "${{ github.event.inputs.api_hash }}"
          STRING_SESSION = "${{ github.event.inputs.string_session }}"
          CHAT = "${{ github.event.inputs.chat_target }}"
          HASHTAG_FILTER = "${{ github.event.inputs.hashtag_filter }}".strip()

          BASE = "saved_files"
          used_names = {}

          print("="*50)
          print("Telegram Video Downloader")
          print("="*50)
          print(f"Chat target: {CHAT}")
          if HASHTAG_FILTER:
              print(f"🏷️  Hashtag filter: #{HASHTAG_FILTER}")
          else:
              print(f"🏷️  Hashtag filter: ALL (no filter)")
          print("="*50)
          print("")

          def remove_emojis(t):
              if not t: return ""
              t = re.sub(r'[⚛️😱👤🆔▶️◀️✅🔹🔸📢💡📌📺🔗📱]', '', t)
              t = re.sub(r'[\U00010000-\U0010ffff]', '', t)
              return t.strip()

          def clean_folder(t):
              if not t: return ""
              t = remove_emojis(t)
              t = re.sub(r'[^\w\s\u0600-\u06FF]', '', t)
              t = t.strip().replace(' ', '_')
              t = re.sub(r'_+', '_', t)
              return t[:50]

          def clean_file(t):
              if not t: return ""
              t = remove_emojis(t)
              t = re.sub(r'[\\/*?:"<>|]', '', t)
              t = t.strip().replace(' ', '_')
              t = re.sub(r'_+', '_', t)
              return t[:80]

          def extract_hashtags(text):
              if not text:
                  return []
              return re.findall(r'#(\w+)', text)

          def has_matching_hashtag(text):
              if not HASHTAG_FILTER:
                  return True
              hashtags = extract_hashtags(text)
              return any(h.lower() == HASHTAG_FILTER.lower() for h in hashtags)

          def get_folder_and_name(msg):
              text = msg.text or msg.message or ""
              if not text:
                  return '_no_tag', None
              lines = text.strip().split('\n')
              
              folder_parts = []
              if lines:
                  folder_parts.append(clean_folder(lines[0]))
              for line in lines[1:]:
                  if 'مدرس' in line: break
                  cl = remove_emojis(line)
                  if cl.startswith('دوره'):
                      folder_parts.append(clean_folder(cl))
              folder = '_'.join(folder_parts) if folder_parts else '_no_tag'
              
              file_parts = []
              for i, line in enumerate(lines):
                  if 'مدرس' in line: break
                  if i == 0: continue
                  cl = remove_emojis(line)
                  if cl and not cl.startswith('دوره'):
                      file_parts.append(clean_file(cl))
              fname = '_'.join(file_parts) if file_parts else None
              return folder, fname

          async def main():
              async with TelegramClient(StringSession(STRING_SESSION), API_ID, API_HASH) as client:
                  me = await client.get_me()
                  print(f"✅ Logged in as: {me.first_name}")
                  entity = await client.get_entity(CHAT)
                  print(f"🎯 Target: {entity.title if hasattr(entity,'title') else entity.id}")
                  print("")
                  
                  os.makedirs(BASE, exist_ok=True)
                  new = 0
                  failed = 0
                  checked = 0
                  video_count = 0
                  skipped = 0
                  
                  if HASHTAG_FILTER:
                      print(f"🏷️  Filtering videos with hashtag: #{HASHTAG_FILTER}")
                  print("🎬 Downloading VIDEO files...")
                  print("")
                  
                  async for msg in client.iter_messages(entity, reverse=True):
                      checked += 1
                      if checked % 500 == 0:
                          print(f"📊 Processed {checked} msgs | Videos: {video_count} | Downloaded: {new} | Failed: {failed}")
                      
                      if not msg.video:
                          continue
                      
                      video_count += 1
                      text = msg.text or msg.message or ""
                      
                      if not has_matching_hashtag(text):
                          skipped += 1
                          continue
                      
                      folder, fname = get_folder_and_name(msg)
                      if not fname:
                          orig = getattr(msg.file, 'name', None)
                          if orig:
                              fname = clean_file(os.path.splitext(orig)[0])
                          else:
                              fname = f"video_{msg.id}"
                      
                      if fname in used_names:
                          used_names[fname] += 1
                          fname = f"{fname}_{used_names[fname]}"
                      else:
                          used_names[fname] = 1
                      
                      fname = fname + '.mp4'
                      path = os.path.join(BASE, folder, fname)
                      os.makedirs(os.path.dirname(path), exist_ok=True)
                      
                      if not os.path.exists(path):
                          try:
                              await msg.download_media(file=path)
                              new += 1
                              print(f"✅ [{new}] {folder}/{fname}")
                              await asyncio.sleep(1)
                          except Exception as e:
                              failed += 1
                              if "too long" in str(e):
                                  short = f"video_{msg.id}.mp4"
                                  short_path = os.path.join(BASE, folder, short)
                                  try:
                                      await msg.download_media(file=short_path)
                                      new += 1
                                      print(f"✅ [{new}] {folder}/{short} (shortened)")
                                      await asyncio.sleep(1)
                                  except:
                                      print(f"❌ Failed msg {msg.id}")
                              else:
                                  print(f"❌ Failed msg {msg.id}: {str(e)[:50]}")
                      else:
                          print(f"⏩ Already exists: {fname}")
                  
                  print("")
                  print("="*50)
                  print(f"🎉 Complete!")
                  print(f"📊 Total messages checked: {checked}")
                  print(f"🎬 Videos found: {video_count}")
                  if HASHTAG_FILTER:
                      print(f"🏷️  Videos with #{HASHTAG_FILTER}: {new + failed}")
                      print(f"⏭️  Skipped (other hashtags): {skipped}")
                  print(f"💾 Downloaded: {new}")
                  print(f"❌ Failed: {failed}")
                  print("="*50)

          asyncio.run(main())
          EOF

      - name: Run download script
        env:
          API_ID: ${{ github.event.inputs.api_id }}
          API_HASH: ${{ github.event.inputs.api_hash }}
          STRING_SESSION: ${{ github.event.inputs.string_session }}
        run: python download.py

      - name: Zip and split folders
        if: success()
        env:
          ZIP_PASSWORD: ${{ github.event.inputs.zip_password }}
        run: |
          BASE_DIR="saved_files"
          SPLIT_SIZE=45
          REPO_OWNER="${{ github.repository_owner }}"
          REPO_NAME="${{ github.event.repository.name }}"
          BRANCH="${GITHUB_REF_NAME}"

          if [ ! -d "$BASE_DIR" ]; then
            echo "No saved_files directory. Exiting."
            exit 0
          fi

          urlencode() { python3 -c "import urllib.parse,sys; print(urllib.parse.quote(sys.argv[1], safe=''))" "$1"; }

          for folder in "$BASE_DIR"/*/ ; do
            [ -d "$folder" ] || continue
            foldername=$(basename "$folder")
            echo "============================================"
            echo "📦 Processing folder: $foldername"
            echo "============================================"

            cd "$BASE_DIR"
            rm -f "${foldername}.zip" "${foldername}.z"* 2>/dev/null || true
            if [ -n "$ZIP_PASSWORD" ]; then
              zip -r -P "$ZIP_PASSWORD" -s ${SPLIT_SIZE}m "${foldername}.zip" "$foldername"
            else
              zip -r -s ${SPLIT_SIZE}m "${foldername}.zip" "$foldername"
            fi
            rm -rf "$foldername"
            cd ../..

            final_readme="$BASE_DIR/${foldername}_README.md"
            echo "# Archive: $foldername" > "$final_readme"
            echo "" >> "$final_readme"
            echo "| # | Part | Download |" >> "$final_readme"
            echo "|---|------|----------|" >> "$final_readme"
            link_counter=1
            for part in $(ls "$BASE_DIR/${foldername}.zip" "$BASE_DIR/${foldername}.z"* 2>/dev/null | sort); do
              part_basename=$(basename "$part")
              part_encoded=$(urlencode "$part_basename")
              raw_link="https://github.com/${REPO_OWNER}/${REPO_NAME}/raw/${BRANCH}/saved_files/${part_encoded}"
              echo "| $link_counter | \`$part_basename\` | [Download]($raw_link) |" >> "$final_readme"
              link_counter=$((link_counter+1))
            done
            echo "✅ $foldername → $((link_counter-1)) parts"
          done

      - name: Incremental Commit & Push
        if: success()
        run: |
          BRANCH="${GITHUB_REF_NAME}"
          REPO_OWNER="${{ github.repository_owner }}"
          REPO_NAME="${{ github.event.repository.name }}"

          echo "=========================================="
          echo "Incremental Push Mode"
          echo "This method pushes files ONE AT A TIME to avoid timeout issues"
          echo "=========================================="

          BACKUP_DIR="saved_files"
          echo "Backup directory: $BACKUP_DIR"

          BACKUP_FILE_COUNT=$(find "$BACKUP_DIR" -type f 2>/dev/null | wc -l)
          echo "Total files to push: $BACKUP_FILE_COUNT"

          if [ "$BACKUP_FILE_COUNT" -eq 0 ]; then
            echo "WARNING: No files in backup directory — all downloads may have failed."
            echo "Ensuring saved_files/ folder exists in repository with a master README..."

            git fetch origin "$BRANCH"
            git reset --hard origin/"$BRANCH"

            mkdir -p saved_files

            if [ ! -f "saved_files/README.md" ]; then
              {
                echo "# DOWNLOADED FILES LIST :"
                echo ""
                echo "----"
                echo ""
                echo "> No files downloaded yet."
              } > saved_files/README.md
              git add -f saved_files/README.md
              if ! git diff --cached --quiet; then
                git commit --amend -m "[Files] Files update [skip ci]" 2>/dev/null || git commit -m "[Files] Files update [skip ci]"
                PUSH_RETRY=0
                while [ $PUSH_RETRY -lt 5 ]; do
                  PUSH_RETRY=$((PUSH_RETRY + 1))
                  if timeout 60 git push --force origin HEAD:"$BRANCH"; then
                    echo "saved_files/ folder initialized and pushed."
                    break
                  else
                    echo "Push failed, retry $PUSH_RETRY/5..."
                    sleep 3
                  fi
                done
              else
                echo "saved_files/README.md already exists, nothing to push."
              fi
            else
              echo "saved_files/ folder already exists in repository."
            fi

            echo "No files to push. Exiting."
            exit 0
          fi

          urlencode() {
            python3 -c "import urllib.parse, sys; print(urllib.parse.quote(sys.argv[1], safe=''))" "$1"
          }

          regenerate_master_readme() {
            MASTER_README="saved_files/README.md"

            echo "Regenerating master README..."

            {
              echo "# DOWNLOADED FILES LIST :"
              echo ""
              echo "----"
              echo ""
            } > "$MASTER_README"

            FILE_EMOJIS=("🎬" "🎥" "📽️" "🎞️" "📺" "🎦" "▶️" "📄" "📁" "🗂️")

            NUM=0

            for folder in saved_files/*/; do
              [ -d "$folder" ] || continue
              FOLDER_NAME=$(basename "$folder")
              [ -f "$folder/README.md" ] || continue

              NUM=$((NUM + 1))
              RANDOM_EMOJI="${FILE_EMOJIS[$RANDOM % ${#FILE_EMOJIS[@]}]}"
              FOLDER_ENCODED=$(python3 -c "import urllib.parse, sys; print(urllib.parse.quote(sys.argv[1], safe=''))" "$FOLDER_NAME")
              FOLDER_LINK="https://github.com/${REPO_OWNER}/${REPO_NAME}/tree/${BRANCH}/saved_files/${FOLDER_ENCODED}"

              printf -- "- %s - %s [%s](%s)\n" "$NUM" "$RANDOM_EMOJI" "$FOLDER_NAME" "$FOLDER_LINK" >> "$MASTER_README"
            done

            echo "Master README regenerated with $NUM folders"
          }

          push_single_file() {
            local FILE_PATH="$1"
            local MAX_RETRIES=5
            local RETRY=0

            while [ $RETRY -lt $MAX_RETRIES ]; do
              RETRY=$((RETRY + 1))

              git fetch origin "$BRANCH" --quiet 2>/dev/null || true

              LOCAL_HEAD=$(git rev-parse HEAD 2>/dev/null || echo "none")
              REMOTE_HEAD=$(git rev-parse origin/"$BRANCH" 2>/dev/null || echo "none")

              if [ "$LOCAL_HEAD" != "$REMOTE_HEAD" ] && [ "$REMOTE_HEAD" != "none" ]; then
                echo "    Syncing with remote..."
                git reset --hard origin/"$BRANCH" 2>/dev/null || true
                mkdir -p saved_files
                cp -r "$BACKUP_DIR"/* saved_files/ 2>/dev/null || true
              fi

              git add "$FILE_PATH" 2>/dev/null || true

              if git diff --cached --quiet 2>/dev/null; then
                echo "    File already exists or no changes"
                return 0
              fi

              FILENAME=$(basename "$FILE_PATH")
              git commit --amend -m "[Files] Files update [skip ci]" --quiet 2>/dev/null || git commit -m "[Files] Files update [skip ci]" --quiet 2>/dev/null || true

              echo "    Push attempt $RETRY/$MAX_RETRIES..."
              if timeout 120 git push --force origin HEAD:"$BRANCH" 2>&1; then
                echo "    SUCCESS!"
                return 0
              else
                echo "    Push failed, retrying..."
                sleep $((2 + RANDOM % 5))
              fi
            done

            echo "    WARNING: Failed to push $FILE_PATH after $MAX_RETRIES attempts"
            return 1
          }

          push_batch() {
            local BATCH_SIZE=5
            local FILES=("$@")
            local BATCH_COUNT=0
            local BATCH_FILES=()
            local TOTAL_PUSHED=0
            local TOTAL_FILES=${#FILES[@]}

            for FILE in "${FILES[@]}"; do
              BATCH_FILES+=("$FILE")
              BATCH_COUNT=$((BATCH_COUNT + 1))

              if [ $BATCH_COUNT -ge $BATCH_SIZE ]; then
                TOTAL_PUSHED=$((TOTAL_PUSHED + BATCH_COUNT))
                echo ""
                echo ">>> Pushing batch ($TOTAL_PUSHED/$TOTAL_FILES files)..."

                git fetch origin "$BRANCH" --quiet 2>/dev/null || true
                git reset --hard origin/"$BRANCH" 2>/dev/null || true
                mkdir -p saved_files
                cp -r "$BACKUP_DIR"/* saved_files/ 2>/dev/null || true

                for BF in "${BATCH_FILES[@]}"; do
                  git add -f "$BF" 2>/dev/null || true
                done

                if ! git diff --cached --quiet 2>/dev/null; then
                  git commit --amend -m "[Files] Files update [skip ci]" --quiet 2>/dev/null || git commit -m "[Files] Files update [skip ci]" --quiet 2>/dev/null || true

                  local PUSH_RETRY=0
                  local PUSH_SUCCESS=false
                  while [ $PUSH_RETRY -lt 5 ]; do
                    PUSH_RETRY=$((PUSH_RETRY + 1))
                    if timeout 180 git push --force origin HEAD:"$BRANCH" 2>&1; then
                      PUSH_SUCCESS=true
                      echo "    Batch pushed successfully!"
                      break
                    else
                      echo "    Batch push failed, attempt $PUSH_RETRY/5..."
                      git fetch origin "$BRANCH" --quiet 2>/dev/null || true
                      git reset --hard origin/"$BRANCH" 2>/dev/null || true
                      mkdir -p saved_files
                      cp -r "$BACKUP_DIR"/* saved_files/ 2>/dev/null || true
                      for BF in "${BATCH_FILES[@]}"; do
                        git add -f "$BF" 2>/dev/null || true
                      done
                      if ! git diff --cached --quiet 2>/dev/null; then
                        git commit --amend -m "[Files] Files update [skip ci]" --quiet 2>/dev/null || git commit -m "[Files] Files update [skip ci]" --quiet 2>/dev/null || true
                      fi
                      sleep $((3 + RANDOM % 7))
                    fi
                  done

                  if [ "$PUSH_SUCCESS" = false ]; then
                    echo "    WARNING: Batch push failed, trying files individually..."
                    for BF in "${BATCH_FILES[@]}"; do
                      push_single_file "$BF"
                    done
                  fi
                fi

                BATCH_FILES=()
                BATCH_COUNT=0
                sleep 2
              fi
            done

            if [ ${#BATCH_FILES[@]} -gt 0 ]; then
              TOTAL_PUSHED=$((TOTAL_PUSHED + ${#BATCH_FILES[@]}))
              echo ""
              echo ">>> Pushing final batch ($TOTAL_PUSHED/$TOTAL_FILES files)..."

              git fetch origin "$BRANCH" --quiet 2>/dev/null || true
              git reset --hard origin/"$BRANCH" 2>/dev/null || true
              mkdir -p saved_files
              cp -r "$BACKUP_DIR"/* saved_files/ 2>/dev/null || true

              for BF in "${BATCH_FILES[@]}"; do
                git add -f "$BF" 2>/dev/null || true
              done

              if ! git diff --cached --quiet 2>/dev/null; then
                git commit --amend -m "[Files] Files update [skip ci]" --quiet 2>/dev/null || git commit -m "[Files] Files update [skip ci]" --quiet 2>/dev/null || true

                local PUSH_RETRY=0
                while [ $PUSH_RETRY -lt 5 ]; do
                  PUSH_RETRY=$((PUSH_RETRY + 1))
                  if timeout 180 git push --force origin HEAD:"$BRANCH" 2>&1; then
                    echo "    Final batch pushed successfully!"
                    break
                  else
                    echo "    Push failed, attempt $PUSH_RETRY/5..."
                    sleep $((3 + RANDOM % 7))
                    git fetch origin "$BRANCH" --quiet 2>/dev/null || true
                    git reset --hard origin/"$BRANCH" 2>/dev/null || true
                    mkdir -p saved_files
                    cp -r "$BACKUP_DIR"/* saved_files/ 2>/dev/null || true
                    for BF in "${BATCH_FILES[@]}"; do
                      git add -f "$BF" 2>/dev/null || true
                    done
                    if ! git diff --cached --quiet 2>/dev/null; then
                      git commit -m "[Files] Add final batch [skip ci]" --quiet 2>/dev/null || true
                    fi
                  fi
                done
              fi
            fi
          }

          echo ""
          echo "=========================================="
          echo "Starting incremental push process..."
          echo "=========================================="

          echo "Syncing with remote repository..."
          git fetch origin "$BRANCH"
          git reset --hard origin/"$BRANCH"

          mkdir -p saved_files
          cp -r "$BACKUP_DIR"/* saved_files/

          echo "Analyzing files to push..."
          ALL_FILES=()

          while IFS= read -r -d '' FILE; do
            ALL_FILES+=("$FILE")
          done < <(find saved_files -name "README.md" -print0 2>/dev/null)

          while IFS= read -r -d '' FILE; do
            ALL_FILES+=("$FILE")
          done < <(find saved_files -type f \( -name "*.zip" -o -name "*.z[0-9]*" -o -name "*.mp4" -o -name "*.jpg" -o -name "*.png" \) -print0 2>/dev/null | sort -z)

          TOTAL_FILES=${#ALL_FILES[@]}
          echo "Found $TOTAL_FILES files to push"
          echo ""

          if [ $TOTAL_FILES -eq 0 ]; then
            echo "No files to push!"
            exit 0
          fi

          TOTAL_SIZE=0
          for F in "${ALL_FILES[@]}"; do
            if [ -f "$F" ]; then
              FSIZE=$(stat -c%s "$F" 2>/dev/null || echo 0)
              TOTAL_SIZE=$((TOTAL_SIZE + FSIZE))
            fi
          done
          TOTAL_SIZE_MB=$((TOTAL_SIZE / 1024 / 1024))
          echo "Total size: ${TOTAL_SIZE_MB}MB"
          echo ""

          if [ $TOTAL_SIZE_MB -lt 100 ]; then
            echo "Small upload - pushing all at once..."

            git add -fA saved_files/
            regenerate_master_readme
            git add -f saved_files/README.md

            if ! git diff --cached --quiet; then
              git commit --amend -m "[Files] Files update [skip ci]" 2>/dev/null || git commit -m "[Files] Files update [skip ci]"

              PUSH_RETRY=0
              while [ $PUSH_RETRY -lt 10 ]; do
                PUSH_RETRY=$((PUSH_RETRY + 1))
                if timeout 300 git push --force origin HEAD:"$BRANCH"; then
                  echo "Push successful!"
                  break
                else
                  echo "Push failed, retry $PUSH_RETRY/10..."
                  sleep $((3 + RANDOM % 7))
                  git fetch origin "$BRANCH"
                  git reset --hard origin/"$BRANCH"
                  mkdir -p saved_files
                  cp -r "$BACKUP_DIR"/* saved_files/
                  git add -fA saved_files/
                  regenerate_master_readme
                  git add -f saved_files/README.md
                  if ! git diff --cached --quiet; then
                    git commit --amend -m "[Files] Files update [skip ci]" 2>/dev/null || git commit -m "[Files] Files update [skip ci]"
                  fi
                fi
              done
            fi

          else
            echo "Large upload (${TOTAL_SIZE_MB}MB) - using incremental batch push..."
            echo ""

            push_batch "${ALL_FILES[@]}"

            echo ""
            echo "Pushing master README..."
            git fetch origin "$BRANCH" --quiet 2>/dev/null || true
            git reset --hard origin/"$BRANCH" 2>/dev/null || true
            mkdir -p saved_files
            cp -r "$BACKUP_DIR"/* saved_files/ 2>/dev/null || true

            regenerate_master_readme
            git add -f saved_files/README.md

            if ! git diff --cached --quiet 2>/dev/null; then
              git commit --amend -m "[Files] Files update [skip ci]" --quiet 2>/dev/null || git commit -m "[Files] Files update [skip ci]" --quiet 2>/dev/null || true

              PUSH_RETRY=0
              while [ $PUSH_RETRY -lt 5 ]; do
                PUSH_RETRY=$((PUSH_RETRY + 1))
                if timeout 60 git push --force origin HEAD:"$BRANCH" 2>&1; then
                  echo "Master README pushed!"
                  break
                else
                  echo "README push failed, retry $PUSH_RETRY/5..."
                  sleep 3
                fi
              done
            fi
          fi

          echo ""
          echo "=========================================="
          echo "All files pushed successfully!"
          echo "=========================================="
