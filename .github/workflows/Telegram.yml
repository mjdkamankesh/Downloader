import asyncio
from telethon import TelegramClient
from telethon.sessions import StringSession

# اطلاعات ورود شما - از ورودی‌های workflow خودت استفاده کن
API_ID = 1234567  # عدد API_ID خودت را اینجا وارد کن
API_HASH = 'your_api_hash_here'
STRING_SESSION = 'your_string_session_here'  # رشته سشن خودت را اینجا بچسبان
CHAT_ID = 'me'  # یا آیدی عددی گروه/کانال

async def main():
    async with TelegramClient(StringSession(STRING_SESSION), API_ID, API_HASH) as client:
        # ارتباط با چت مورد نظر
        entity = await client.get_entity(CHAT_ID)
        print(f"در حال دریافت ۲۰ پیام آخر از: {entity.title if hasattr(entity, 'title') else 'Saved Messages'}")
        print("-" * 40)

        count = 0
        # گرفتن آخرین ۲۰ پیام (از جدید به قدیم)
        async for message in client.iter_messages(entity, limit=20):
            # فقط متن پیام (جلوگیری از خطا)
            msg_text = message.text or message.message or "[این پیام مدیا یا پوشه است]"
            # چاپ شماره پیام و بخش اول متن آن
            print(f"Message ID: {message.id}\nText: {msg_text[:80]}...\n{'-'*40}")
            count += 1
        
        print(f"\nتعداد {count} پیام آخر دریافت شد.")

        # اگر می‌خواهی یک بازه خاص ببینی، می‌توانی از این خط استفاده کنی:
        # async for msg in client.iter_messages(entity, min_id=1000, max_id=1020):
        #     print(msg.id)

if __name__ == '__main__':
    asyncio.run(main())
