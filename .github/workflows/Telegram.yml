name: 📥 Telegram Chat Downloader (Video & Photo)

on:
  workflow_dispatch:
    inputs:
      api_id:
        description: '🔑 API ID (از my.telegram.org)'
        required: true
        type: string
      api_hash:
        description: '🔐 API HASH (از my.telegram.org)'
        required: true
        type: string
      string_session:
        description: '📱 String Session (با اسکریپت make_session.py بگیرید)'
        required: true
        type: string
      chat_target:
        description: '🎯 آیدی یا یوزرنیم کانال/گروه (برای Saved Messages: me)'
        required: true
        type: string
        default: 'me'
      file_type:
        description: '🎬 نوع فایل برای دانلود'
        required: true
        type: choice
        default: 'video_photo'
        options:
          - 'video_photo'
          - 'video'
          - 'photo'
          - 'all'
      start_message_id:
        description: '🔢 از شماره پیام (0 = ابتدای چت)'
        required: false
        default: '0'
        type: string
      end_message_id:
        description: '🔢 تا شماره پیام (خالی = تا آخر)'
        required: false
        default: ''
        type: string
      zip_password:
        description: '🔒 رمز فایل‌های زیپ (اختیاری)'
        required: false
        default: ''
        type: string

jobs:
  backup:
    runs-on: ubuntu-latest
    timeout-minutes: 120
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Configure Git
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "github-actions@github.com"
          git config --global pull.rebase true

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: pip install telethon

      - name: Create download script
        run: |
          cat > download_chat.py << 'EOF'
          import os
          import sys
          import re
          import asyncio
          from telethon import TelegramClient
          from telethon.sessions import StringSession
          from telethon.errors import UsernameNotOccupiedError, ChannelPrivateError
          from telethon.tl.types import MessageMediaDocument, MessageMediaPhoto

          print("=== SCRIPT STARTED ===")

          # خواندن از متغیرهای محیطی
          API_ID = int(os.environ.get('API_ID', 0))
          API_HASH = os.environ.get('API_HASH', '')
          STRING_SESSION = os.environ.get('STRING_SESSION', '')
          CHAT_TARGET = os.environ.get('CHAT_TARGET', 'me')
          FILE_TYPE = os.environ.get('FILE_TYPE', 'video_photo')
          START_ID = int(os.environ.get('START_ID', '0'))
          END_ID_RAW = os.environ.get('END_ID', '')
          END_ID = int(END_ID_RAW) if END_ID_RAW and END_ID_RAW.strip() else None

          print(f"API_ID: {API_ID}")
          print(f"API_HASH: {API_HASH[:10] if API_HASH else 'MISSING'}...")
          print(f"STRING_SESSION: {STRING_SESSION[:15] if STRING_SESSION else 'MISSING'}...")
          print(f"CHAT_TARGET: {CHAT_TARGET}")
          print(f"FILE_TYPE: {FILE_TYPE}")
          print(f"START_ID: {START_ID}")

          if not API_ID or not API_HASH or not STRING_SESSION:
              print("❌ ERROR: Missing required credentials!")
              sys.exit(1)

          BASE_DIR = 'saved_files'

          def get_file_type_and_ext(message):
              """تشخیص نوع فایل و پسوند صحیح آن"""
              if not message.media:
                  return None, None
              
              # عکس
              if hasattr(message.media, 'photo'):
                  return 'photo', '.jpg'
              
              # ویدیو یا سایر اسناد
              if hasattr(message.media, 'document') and message.media.document:
                  mime_type = getattr(message.media.document, 'mime_type', '')
                  
                  # ویدیو
                  if 'video' in mime_type:
                      # تشخیص پسوند ویدیو
                      if 'mp4' in mime_type:
                          return 'video', '.mp4'
                      elif 'x-matroska' in mime_type:
                          return 'video', '.mkv'
                      elif 'webm' in mime_type:
                          return 'video', '.webm'
                      else:
                          return 'video', '.mp4'
                  
                  # عکس (اگر به عنوان document ارسال شده باشد)
                  if 'image' in mime_type:
                      if 'jpeg' in mime_type or 'jpg' in mime_type:
                          return 'photo', '.jpg'
                      elif 'png' in mime_type:
                          return 'photo', '.png'
                      elif 'gif' in mime_type:
                          return 'photo', '.gif'
                      else:
                          return 'photo', '.jpg'
                  
                  # سایر فایل‌ها (ما فقط ویدیو و عکس می‌خواهیم)
                  return 'other', None
              
              return None, None

          def should_download(file_type):
              """بررسی آیا این نوع فایل باید دانلود شود"""
              if FILE_TYPE == 'all':
                  return True
              if FILE_TYPE == 'video_photo':
                  return file_type in ['video', 'photo']
              if FILE_TYPE == 'video':
                  return file_type == 'video'
              if FILE_TYPE == 'photo':
                  return file_type == 'photo'
              return False

          def extract_folder_and_filename(text):
              if not text:
                  return '_no_tag', None
              hashtag_match = re.search(r'#(\w+)', text)
              folder_name = hashtag_match.group(1) if hashtag_match else '_no_tag'
              tick_match = re.search(r'✅([^#]+)', text)
              if tick_match:
                  raw = tick_match.group(1).strip()
                  # محدود کردن طول نام فایل به 150 کاراکتر
                  safe = re.sub(r'[\\/*?:"<>|]', '-', raw).strip()
                  if len(safe) > 150:
                      safe = safe[:150]
                  return folder_name, safe if safe else None
              return folder_name, None

          def get_original_filename(message):
              """دریافت نام اصلی فایل اگر وجود داشته باشد"""
              if hasattr(message.media, 'document') and message.media.document:
                  attrs = message.media.document.attributes
                  for attr in attrs:
                      if hasattr(attr, 'file_name') and attr.file_name:
                          name = attr.file_name
                          # حذف پسوند از نام
                          if '.' in name:
                              name = '.'.join(name.split('.')[:-1])
                          # محدود کردن طول
                          if len(name) > 150:
                              name = name[:150]
                          return name
              return None

          async def main():
              print("=== Connecting to Telegram ===")
              async with TelegramClient(StringSession(STRING_SESSION), API_ID, API_HASH) as client:
                  print("✓ Client created")
                  
                  try:
                      me = await client.get_me()
                      print(f"✓ Logged in as: {me.first_name}")
                  except Exception as e:
                      print(f"❌ Login failed: {e}")
                      return

                  try:
                      entity = await client.get_entity(CHAT_TARGET)
                      name = entity.title if hasattr(entity, 'title') else str(entity.id)
                      print(f"✅ Target: {name}")
                  except Exception as e:
                      print(f"❌ Cannot access chat: {e}")
                      return

                  os.makedirs(BASE_DIR, exist_ok=True)
                  new_count = 0
                  msg_count = 0
                  video_count = 0
                  photo_count = 0

                  min_id = START_ID if START_ID > 0 else 0
                  print(f"Starting from ID: {min_id}")
                  
                  if FILE_TYPE == 'video_photo':
                      print("🎬 Downloading: Videos and Photos")
                  elif FILE_TYPE == 'video':
                      print("🎬 Downloading: Videos only")
                  elif FILE_TYPE == 'photo':
                      print("📸 Downloading: Photos only")
                  else:
                      print("📁 Downloading: All files")

                  async for msg in client.iter_messages(entity, min_id=min_id, max_id=END_ID, reverse=True):
                      msg_count += 1
                      if msg_count % 100 == 0:
                          print(f"📊 Processed {msg_count} msgs...")

                      # تشخیص نوع فایل و پسوند
                      file_type, extension = get_file_type_and_ext(msg)
                      if not file_type or not should_download(file_type):
                          continue
                      
                      if file_type == 'video':
                          video_count += 1
                      else:
                          photo_count += 1
                      
                      text = msg.text or msg.message or ""
                      folder, fname = extract_folder_and_filename(text)

                      # اگر اسم فایل از متن استخراج نشد
                      if not fname:
                          # اول سعی کن اسم اصلی را بگیر
                          original_name = get_original_filename(msg)
                          if original_name:
                              fname = original_name
                          else:
                              fname = f"{file_type}_{msg.id}"

                      folder_path = os.path.join(BASE_DIR, folder)
                      os.makedirs(folder_path, exist_ok=True)

                      # اضافه کردن پسوند صحیح
                      if not fname.endswith(extension):
                          fname += extension

                      path = os.path.join(folder_path, fname)
                      
                      # بررسی طول مسیر (حداکثر 255 کاراکتر)
                      if len(path) > 255:
                          # کوتاه کردن نام فایل
                          name_part = fname[:50]
                          fname = f"{name_part}_{msg.id}{extension}"
                          path = os.path.join(folder_path, fname)
                      
                      if not os.path.exists(path):
                          try:
                              await msg.download_media(file=path)
                              print(f"✅ [{file_type}] {folder}/{fname}")
                              new_count += 1
                          except Exception as e:
                              if "File name too long" in str(e):
                                  # دوباره با نام کوتاه‌تر تلاش کن
                                  short_name = f"{file_type}_{msg.id}{extension}"
                                  short_path = os.path.join(folder_path, short_name)
                                  try:
                                      await msg.download_media(file=short_path)
                                      print(f"✅ [{file_type}] {folder}/{short_name} (shortened)")
                                      new_count += 1
                                  except Exception as e2:
                                      print(f"❌ Failed {msg.id}: {e2}")
                              else:
                                  print(f"❌ Failed {msg.id}: {e}")
                      else:
                          print(f"⏩ Already exists: {fname}")

                  print(f"\n🎉 Complete!")
                  print(f"📊 Total messages checked: {msg_count}")
                  print(f"📈 Videos found: {video_count}, Photos found: {photo_count}")
                  print(f"💾 Downloaded new files: {new_count}")

          if __name__ == '__main__':
              try:
                  asyncio.run(main())
              except Exception as e:
                  print(f"❌ Fatal error: {e}")
                  import traceback
                  traceback.print_exc()
                  sys.exit(1)
          EOF
          
          echo "✓ Script created"

      - name: Run download script
        env:
          API_ID: ${{ github.event.inputs.api_id }}
          API_HASH: ${{ github.event.inputs.api_hash }}
          STRING_SESSION: ${{ github.event.inputs.string_session }}
          CHAT_TARGET: ${{ github.event.inputs.chat_target }}
          FILE_TYPE: ${{ github.event.inputs.file_type }}
          START_ID: ${{ github.event.inputs.start_message_id }}
          END_ID: ${{ github.event.inputs.end_message_id }}
        run: |
          echo "=== Starting download ==="
          echo "File type filter: ${{ github.event.inputs.file_type }}"
          python download_chat.py
          echo "=== Download finished ==="

      - name: Zip, split & create README
        if: success()
        env:
          ZIP_PASSWORD: ${{ github.event.inputs.zip_password }}
        run: |
          BASE_DIR="saved_files"
          SPLIT_SIZE=45
          REPO_OWNER="${{ github.repository_owner }}"
          REPO_NAME="${{ github.event.repository.name }}"
          BRANCH="${GITHUB_REF_NAME}"

          [ ! -d "$BASE_DIR" ] && echo "No files found" && exit 0

          urlencode() { python3 -c "import urllib.parse,sys; print(urllib.parse.quote(sys.argv[1]))" "$1"; }

          for folder in "$BASE_DIR"/*/ ; do
            [ -d "$folder" ] || continue
            name=$(basename "$folder")
            echo "📦 Zipping: $name"

            cd "$BASE_DIR"
            rm -f "${name}.zip" "${name}.z"* 2>/dev/null
            [ -n "$ZIP_PASSWORD" ] && pass="-P $ZIP_PASSWORD" || pass=""
            zip -r $pass -s ${SPLIT_SIZE}m "${name}.zip" "$name"
            rm -rf "$name"
            cd ../..

            readme="$BASE_DIR/${name}_README.md"
            echo "# $name" > "$readme"
            echo "" >> "$readme"
            echo "| # | Part | Download |" >> "$readme"
            echo "|---|------|----------|" >> "$readme"
            
            count=1
            for part in $(ls "$BASE_DIR/${name}.zip" "$BASE_DIR/${name}.z"* 2>/dev/null | sort); do
              bname=$(basename "$part")
              enc=$(urlencode "$bname")
              link="https://github.com/${REPO_OWNER}/${REPO_NAME}/raw/${BRANCH}/saved_files/${enc}"
              echo "| $count | \`$bname\` | [Download]($link) |" >> "$readme"
              count=$((count+1))
            done
            echo "✅ $name → $((count-1)) parts"
          done

      - name: Commit and push
        if: success()
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git pull --rebase origin ${GITHUB_REF_NAME} --no-edit || true
          git add saved_files/
          git diff --quiet && git diff --staged --quiet || git commit -m "Backup $(date -u '+%Y-%m-%d %H:%M:%S')"
          git push
