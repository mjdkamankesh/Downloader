name: 📥 Telegram Video Downloader (Fast Mode)

on:
  workflow_dispatch:
    inputs:
      api_id:
        description: '🔑 API ID'
        required: true
        type: string
      api_hash:
        description: '🔐 API HASH'
        required: true
        type: string
      string_session:
        description: '📱 String Session'
        required: true
        type: string
      chat_target:
        description: '🎯 هدف (برای Saved Messages: me)'
        required: true
        type: string
        default: 'me'
      start_id:
        description: '🔢 شروع از Message ID (مثال: 553189)'
        required: true
        type: string
        default: '553189'
      end_id:
        description: '🔢 تا Message ID (مثال: 553820) - خالی = تا آخر'
        required: false
        type: string
        default: ''
      zip_password:
        description: '🔒 رمز فایل‌های زیپ (اختیاری)'
        required: false
        default: ''
        type: string

jobs:
  backup:
    runs-on: ubuntu-latest
    timeout-minutes: 360
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "actions@github.com"

      - uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - run: pip install telethon

      - name: Create download script
        run: |
          cat > download.py << 'EOF'
          import os, re, asyncio
          from telethon import TelegramClient
          from telethon.sessions import StringSession

          API_ID = int(os.environ['API_ID'])
          API_HASH = os.environ['API_HASH']
          STRING_SESSION = os.environ['STRING_SESSION']
          CHAT = os.environ.get('CHAT', 'me')
          START_ID = int(os.environ.get('START_ID', '553189'))
          END_ID_RAW = os.environ.get('END_ID', '')
          END_ID = int(END_ID_RAW) if END_ID_RAW and END_ID_RAW.strip() else None

          BASE = "saved_files"
          used_names = {}

          print("="*50)
          print("Telegram Video Downloader (Fast Mode)")
          print("="*50)
          print(f"Chat target: {CHAT}")
          print(f"Message ID range: {START_ID} → {END_ID if END_ID else 'END'}")
          print("="*50)
          print("")

          def remove_emojis(t):
              if not t: return ""
              t = re.sub(r'[⚛️😱👤🆔▶️◀️✅🔹🔸📢💡📌📺🔗📱]', '', t)
              t = re.sub(r'[\U00010000-\U0010ffff]', '', t)
              return t.strip()

          def clean_folder(t):
              if not t: return ""
              t = remove_emojis(t)
              t = re.sub(r'[^\w\s\u0600-\u06FF]', '', t)
              t = t.strip().replace(' ', '_')
              t = re.sub(r'_+', '_', t)
              return t[:50]

          def clean_file(t):
              if not t: return ""
              t = remove_emojis(t)
              t = re.sub(r'[\\/*?:"<>|]', '', t)
              t = t.strip().replace(' ', '_')
              t = re.sub(r'_+', '_', t)
              return t[:80]

          def get_folder_and_name(msg):
              text = msg.text or msg.message or ""
              if not text:
                  return '_no_tag', None
              lines = text.strip().split('\n')
              
              folder_parts = []
              if lines:
                  folder_parts.append(clean_folder(lines[0]))
              for line in lines[1:]:
                  if 'مدرس' in line: break
                  cl = remove_emojis(line)
                  if cl.startswith('دوره'):
                      folder_parts.append(clean_folder(cl))
              folder = '_'.join(folder_parts) if folder_parts else '_no_tag'
              
              file_parts = []
              for i, line in enumerate(lines):
                  if 'مدرس' in line: break
                  if i == 0: continue
                  cl = remove_emojis(line)
                  if cl and not cl.startswith('دوره'):
                      file_parts.append(clean_file(cl))
              fname = '_'.join(file_parts) if file_parts else None
              return folder, fname

          async def main():
              async with TelegramClient(StringSession(STRING_SESSION), API_ID, API_HASH) as client:
                  me = await client.get_me()
                  print(f"✅ Logged in as: {me.first_name}")
                  entity = await client.get_entity(CHAT)
                  print(f"🎯 Target: {entity.title if hasattr(entity,'title') else entity.id}")
                  print("")
                  
                  os.makedirs(BASE, exist_ok=True)
                  new = 0
                  failed = 0
                  checked = 0
                  
                  print(f"📊 Scanning messages from {START_ID} to {END_ID if END_ID else 'END'}...")
                  print("")
                  
                  async for msg in client.iter_messages(entity, min_id=START_ID, max_id=END_ID, reverse=True):
                      checked += 1
                      if checked % 100 == 0:
                          print(f"📊 Scanned {checked} messages | Downloaded: {new} | Failed: {failed}")
                      
                      if not msg.video:
                          continue
                      
                      folder, fname = get_folder_and_name(msg)
                      if not fname:
                          orig = getattr(msg.file, 'name', None)
                          if orig:
                              fname = clean_file(os.path.splitext(orig)[0])
                          else:
                              fname = f"video_{msg.id}"
                      
                      if fname in used_names:
                          used_names[fname] += 1
                          fname = f"{fname}_{used_names[fname]}"
                      else:
                          used_names[fname] = 1
                      
                      fname = fname + '.mp4'
                      path = os.path.join(BASE, folder, fname)
                      os.makedirs(os.path.dirname(path), exist_ok=True)
                      
                      if not os.path.exists(path):
                          try:
                              print(f"⬇️ [{new+1}] Downloading: {folder}/{fname} (ID: {msg.id})")
                              await msg.download_media(file=path)
                              new += 1
                              print(f"✅ [{new}] Done! ({fname})")
                              
                              # تایمر بین دانلودها - جلوگیری از هنگ
                              await asyncio.sleep(2)
                              
                              # هر 10 فایل، 5 ثانیه استراحت
                              if new % 10 == 0:
                                  print("⏸️ Taking a 5 second break...")
                                  await asyncio.sleep(5)
                                  
                          except Exception as e:
                              failed += 1
                              print(f"❌ Failed msg {msg.id}: {str(e)[:80]}")
                              await asyncio.sleep(1)
                      else:
                          print(f"⏩ Already exists: {fname}")
                  
                  print("")
                  print("="*50)
                  print(f"🎉 Complete!")
                  print(f"📊 Messages scanned: {checked}")
                  print(f"💾 Downloaded: {new}")
                  print(f"❌ Failed: {failed}")
                  print("="*50)

          asyncio.run(main())
          EOF

      - name: Run download script
        env:
          API_ID: ${{ github.event.inputs.api_id }}
          API_HASH: ${{ github.event.inputs.api_hash }}
          STRING_SESSION: ${{ github.event.inputs.string_session }}
          CHAT: ${{ github.event.inputs.chat_target }}
          START_ID: ${{ github.event.inputs.start_id }}
          END_ID: ${{ github.event.inputs.end_id }}
        run: python download.py

      - name: Zip and split folders
        if: success()
        env:
          ZIP_PASSWORD: ${{ github.event.inputs.zip_password }}
        run: |
          BASE_DIR="saved_files"
          SPLIT_SIZE=45
          REPO_OWNER="${{ github.repository_owner }}"
          REPO_NAME="${{ github.event.repository.name }}"
          BRANCH="${GITHUB_REF_NAME}"

          if [ ! -d "$BASE_DIR" ]; then
            echo "No saved_files directory. Exiting."
            exit 0
          fi

          urlencode() { python3 -c "import urllib.parse,sys; print(urllib.parse.quote(sys.argv[1], safe=''))" "$1"; }

          for folder in "$BASE_DIR"/*/ ; do
            [ -d "$folder" ] || continue
            foldername=$(basename "$folder")
            echo "📦 Zipping: $foldername"

            cd "$BASE_DIR"
            rm -f "${foldername}.zip" "${foldername}.z"* 2>/dev/null || true
            if [ -n "$ZIP_PASSWORD" ]; then
              zip -r -P "$ZIP_PASSWORD" -s ${SPLIT_SIZE}m "${foldername}.zip" "$foldername"
            else
              zip -r -s ${SPLIT_SIZE}m "${foldername}.zip" "$foldername"
            fi
            rm -rf "$foldername"
            cd ../..
            
            # تایمر بین زیپ کردن پوشه‌ها
            sleep 3
          done

      - name: Push to repository
        if: success()
        run: |
          BRANCH="${GITHUB_REF_NAME}"

          echo "=========================================="
          echo "Pushing files to repository..."
          echo "=========================================="

          git fetch origin "$BRANCH"
          git reset --hard origin/"$BRANCH" 2>/dev/null || true

          mkdir -p saved_files
          cp -r saved_files/* saved_files/ 2>/dev/null || true

          git add -f saved_files/

          if git diff --cached --quiet; then
            echo "No changes to push"
            exit 0
          fi

          git commit -m "Video backup $(date -u '+%Y-%m-%d %H:%M:%S') [skip ci]"

          # تلاش برای پوش با تایمر و چند بار تکرار
          MAX_RETRIES=10
          RETRY=0
          while [ $RETRY -lt $MAX_RETRIES ]; do
            RETRY=$((RETRY + 1))
            echo "Push attempt $RETRY/$MAX_RETRIES..."
            
            if timeout 180 git push origin HEAD:"$BRANCH" 2>&1; then
              echo "✅ Push successful!"
              exit 0
            else
              echo "⚠️ Push failed, waiting 10 seconds before retry..."
              sleep 10
              
              # همگام‌سازی مجدد
              git fetch origin "$BRANCH"
              git reset --hard origin/"$BRANCH" 2>/dev/null || true
              mkdir -p saved_files
              cp -r saved_files/* saved_files/ 2>/dev/null || true
              git add -f saved_files/
              git commit -m "Video backup $(date -u '+%Y-%m-%d %H:%M:%S') [skip ci]" || true
            fi
          done

          echo "❌ Push failed after $MAX_RETRIES attempts"
          exit 1
