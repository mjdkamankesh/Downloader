
Or use 7-Zip/WinRAR which support split zip files directly.

## 📅 Backup Info

README_EOF
        
        echo "- **Date:** $(date -u '+%Y-%m-%d %H:%M:%S UTC')" >> backup/README.md
        echo "- **Source:** Telegram Chat Backup" >> backup/README.md
        echo "" >> backup/README.md
        echo "---" >> backup/README.md
        echo "*Auto-generated by GitHub Actions*" >> backup/README.md

    - name: Push to repository
      if: success()
      run: |
        FINAL_DIR=$(cat /tmp/final_dir_name.txt)
        BRANCH="${GITHUB_REF_NAME:-main}"
        
        echo "=========================================="
        echo "Pushing files to GitHub"
        echo "=========================================="
        echo "Branch: $BRANCH"
        echo "Directory: $FINAL_DIR"
        
        git fetch origin "$BRANCH" 2>/dev/null || true
        git checkout "$BRANCH" 2>/dev/null || git checkout -b "$BRANCH"
        
        mkdir -p backup
        
        if [ -d "$FINAL_DIR" ]; then
            cp -r "$FINAL_DIR"/* backup/ 2>/dev/null || true
            echo "✅ Copied files to backup/"
        fi
        
        git add backup/ 2>/dev/null || true
        
        if git diff --cached --quiet; then
            echo "ℹ️ No new files to commit"
            exit 0
        fi
        
        file_count=$(git diff --cached --numstat | wc -l)
        echo "📁 Files to commit: $file_count"
        
        commit_msg="[Auto Backup] Telegram videos - $(date -u '+%Y-%m-%d %H:%M:%S') [skip ci]"
        git commit -m "$commit_msg"
        
        max_retries=5
        retry=0
        pushed=false
        
        while [ $retry -lt $max_retries ] && [ "$pushed" = false ]; do
            retry=$((retry + 1))
            echo "Push attempt $retry/$max_retries..."
            
            if git push origin "$BRANCH" 2>&1; then
                pushed=true
                echo "✅ Push successful!"
            else
                echo "⚠️ Push failed, retrying in 5 seconds..."
                sleep 5
                
                git fetch origin "$BRANCH" 2>/dev/null || true
                git pull origin "$BRANCH" --rebase 2>/dev/null || true
                git add backup/ 2>/dev/null || true
                if ! git diff --cached --quiet; then
                    git commit -m "$commit_msg (retry $retry)" 2>/dev/null || true
                fi
            fi
        done
        
        if [ "$pushed" = false ]; then
            echo "❌ Failed to push after $max_retries attempts"
            exit 1
        fi
        
        echo ""
        echo "=========================================="
        echo "📊 FINAL STATISTICS"
        echo "=========================================="
        echo "Files in backup directory:"
        ls -lh backup/ | head -20
        
        total_size=$(du -sh backup/ 2>/dev/null | cut -f1)
        echo ""
        echo "Total backup size: $total_size"
        echo "=========================================="

    - name: Cleanup
      if: always()
      run: |
        rm -f /tmp/final_dir_name.txt
        rm -rf saved_files 2>/dev/null || true
        echo "✅ Cleanup completed"
