name: 📥 Telegram Video Downloader (with WARP)

on:
  workflow_dispatch:
    inputs:
      api_id:
        description: '🔑 API ID'
        required: true
        type: string
      api_hash:
        description: '🔐 API HASH'
        required: true
        type: string
      string_session:
        description: '📱 String Session'
        required: true
        type: string
      start_id:
        description: '🔢 شروع از Message ID'
        required: true
        type: string
        default: '553189'
      end_id:
        description: '🔢 تا Message ID'
        required: false
        type: string
        default: ''
      zip_password:
        description: '🔒 رمز فایل‌های زیپ'
        required: false
        default: ''

jobs:
  backup:
    runs-on: ubuntu-latest
    timeout-minutes: 360
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "actions@github.com"

      - name: Start Cloudflare WARP
        run: |
          echo "Starting Cloudflare WARP container..."
          
          docker run -d \
            --name warp \
            --restart=always \
            --cap-add NET_ADMIN \
            --sysctl net.ipv6.conf.all.disable_ipv6=0 \
            --sysctl net.ipv4.conf.all.src_valid_mark=1 \
            -v warp-data:/var/lib/cloudflare-warp \
            caomingjun/warp
          
          echo "Waiting for WARP to initialize..."
          sleep 15
          
          # تست WARP
          for i in {1..5}; do
            RESULT=$(curl -s --max-time 5 https://cloudflare.com/cdn-cgi/trace 2>/dev/null || echo "failed")
            if echo "$RESULT" | grep -qE "warp=(on|plus)"; then
              echo "✅ WARP is active!"
              echo "$RESULT"
              break
            else
              echo "Attempt $i/5 - WARP not ready yet..."
              sleep 5
            fi
          done

      - uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - run: pip install telethon

      - name: Download videos via WARP
        env:
          API_ID: ${{ github.event.inputs.api_id }}
          API_HASH: ${{ github.event.inputs.api_hash }}
          STRING_SESSION: ${{ github.event.inputs.string_session }}
          START_ID: ${{ github.event.inputs.start_id }}
          END_ID: ${{ github.event.inputs.end_id }}
        run: |
          python << 'PYEOF'
          import os, re, asyncio
          from telethon import TelegramClient
          from telethon.sessions import StringSession
          from telethon.errors import FloodWaitError

          print("="*50)
          print("STARTING DOWNLOADER with WARP")
          print("="*50)

          API_ID = int(os.environ['API_ID'])
          API_HASH = os.environ['API_HASH']
          STRING_SESSION = os.environ['STRING_SESSION']
          START_ID = int(os.environ.get('START_ID', '553189'))
          END_ID_RAW = os.environ.get('END_ID', '')
          END_ID = int(END_ID_RAW) if END_ID_RAW and END_ID_RAW.strip() else None

          print(f"API_ID: {API_ID}")
          print(f"START_ID: {START_ID}")
          print(f"END_ID: {END_ID if END_ID else 'END'}")
          print("")

          BASE = "saved_files"
          used_names = {}

          def remove_emojis(t):
              if not t: return ""
              t = re.sub(r'[⚛️😱👤🆔▶️◀️✅🔹🔸📢💡📌📺🔗📱]', '', t)
              t = re.sub(r'[\U00010000-\U0010ffff]', '', t)
              return t.strip()

          def clean_folder(t):
              if not t: return ""
              t = remove_emojis(t)
              t = re.sub(r'[^\w\s\u0600-\u06FF]', '', t)
              t = t.strip().replace(' ', '_')
              t = re.sub(r'_+', '_', t)
              return t[:50]

          def clean_file(t):
              if not t: return ""
              t = remove_emojis(t)
              t = re.sub(r'[\\/*?:"<>|]', '', t)
              t = t.strip().replace(' ', '_')
              t = re.sub(r'_+', '_', t)
              return t[:80]

          def get_folder_and_name(msg):
              text = msg.text or msg.message or ""
              if not text:
                  return '_no_tag', None
              lines = text.strip().split('\n')
              
              folder_parts = []
              if lines:
                  folder_parts.append(clean_folder(lines[0]))
              for line in lines[1:]:
                  if 'مدرس' in line: break
                  cl = remove_emojis(line)
                  if cl.startswith('دوره'):
                      folder_parts.append(clean_folder(cl))
              folder = '_'.join(folder_parts) if folder_parts else '_no_tag'
              
              file_parts = []
              for i, line in enumerate(lines):
                  if 'مدرس' in line: break
                  if i == 0: continue
                  cl = remove_emojis(line)
                  if cl and not cl.startswith('دوره'):
                      file_parts.append(clean_file(cl))
              fname = '_'.join(file_parts) if file_parts else None
              return folder, fname

          async def main():
              print("Creating client...")
              client = TelegramClient(StringSession(STRING_SESSION), API_ID, API_HASH)
              
              print("Connecting...")
              await client.connect()
              
              print("Checking authorization...")
              if not await client.is_user_authorized():
                  print("❌ Not authorized! StringSession may be invalid.")
                  return
              
              print("Getting me...")
              me = await client.get_me()
              print(f"✅ Logged in as: {me.first_name}")
              
              print("Getting entity...")
              entity = await client.get_entity('me')
              print(f"✅ Target: Saved Messages")
              
              os.makedirs(BASE, exist_ok=True)
              new = 0
              failed = 0
              checked = 0
              
              print(f"\n📊 Scanning messages from {START_ID} to {END_ID if END_ID else 'END'}...\n")
              
              try:
                  async for msg in client.iter_messages(entity, min_id=START_ID, max_id=END_ID, reverse=True):
                      checked += 1
                      if checked % 100 == 0:
                          print(f"📊 Scanned {checked} msgs | Downloaded: {new} | Failed: {failed}")
                      
                      if not msg.video:
                          continue
                      
                      folder, fname = get_folder_and_name(msg)
                      if not fname:
                          orig = getattr(msg.file, 'name', None)
                          if orig:
                              fname = clean_file(os.path.splitext(orig)[0])
                          else:
                              fname = f"video_{msg.id}"
                      
                      if fname in used_names:
                          used_names[fname] += 1
                          fname = f"{fname}_{used_names[fname]}"
                      else:
                          used_names[fname] = 1
                      
                      fname = fname + '.mp4'
                      path = os.path.join(BASE, folder, fname)
                      os.makedirs(os.path.dirname(path), exist_ok=True)
                      
                      if not os.path.exists(path):
                          try:
                              print(f"⬇️ [{new+1}] {folder}/{fname} (ID: {msg.id})")
                              await msg.download_media(file=path)
                              new += 1
                              print(f"✅ Done!")
                              await asyncio.sleep(1)
                          except FloodWaitError as e:
                              print(f"⏳ Flood wait: {e.seconds}s")
                              await asyncio.sleep(e.seconds)
                          except Exception as e:
                              failed += 1
                              print(f"❌ Failed: {str(e)[:80]}")
                      else:
                          print(f"⏩ Already exists: {fname}")
              except Exception as e:
                  print(f"❌ Fatal error: {e}")
                  import traceback
                  traceback.print_exc()
              
              print("\n" + "="*50)
              print(f"🎉 Complete! Scanned: {checked}, Downloaded: {new}, Failed: {failed}")
              print("="*50)
              await client.disconnect()

          asyncio.run(main())
          PYEOF

      - name: Stop WARP
        if: always()
        run: |
          docker stop warp || true
          docker rm warp || true

      - name: Zip and push
        if: success()
        run: |
          echo "Zipping files..."
          if [ -d "saved_files" ]; then
            for folder in saved_files/*/; do
              [ -d "$folder" ] || continue
              name=$(basename "$folder")
              cd saved_files
              zip -r -s 45m "${name}.zip" "$name" 2>/dev/null && rm -rf "$name"
              cd ..
              sleep 2
            done
          fi

          echo "Pushing to GitHub..."
          git add saved_files/ 2>/dev/null || true
          git diff --cached --quiet || git commit -m "Video backup $(date -u '+%Y-%m-%d %H:%M:%S')" || true
          
          for i in 1 2 3 4 5; do
            if git push origin HEAD:"${GITHUB_REF_NAME}" 2>&1; then
              echo "✅ Push successful!"
              break
            else
              echo "⚠️ Push failed, retry $i/5..."
              sleep 10
              git pull origin "${GITHUB_REF_NAME}" --rebase || true
            fi
          done
