name: 📥 Telegram Chat Downloader (With Progress)

on:
  workflow_dispatch:
    inputs:
      api_id:
        description: '🔑 API ID'
        required: true
        type: string
      api_hash:
        description: '🔐 API HASH'
        required: true
        type: string
      string_session:
        description: '📱 String Session'
        required: true
        type: string
      chat_target:
        description: '🎯 هدف (برای Saved Messages: me)'
        required: true
        type: string
        default: 'me'
      start_message_id:
        description: '🔢 از شماره پیام'
        required: false
        default: '0'
        type: string
      end_message_id:
        description: '🔢 تا شماره پیام'
        required: false
        default: ''
        type: string
      zip_password:
        description: '🔒 رمز زیپ'
        required: false
        default: ''
        type: string

jobs:
  backup:
    runs-on: ubuntu-latest
    timeout-minutes: 360
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "actions@github.com"

      - uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - run: pip install telethon

      - name: Create script
        run: |
          cat > download.py << 'EOF'
          import os, re, asyncio, sys
          from telethon import TelegramClient
          from telethon.sessions import StringSession

          API_ID = ${{ github.event.inputs.api_id }}
          API_HASH = "${{ github.event.inputs.api_hash }}"
          STRING_SESSION = "${{ github.event.inputs.string_session }}"
          CHAT = "${{ github.event.inputs.chat_target }}"
          START = int("${{ github.event.inputs.start_message_id }}" or "0")
          END_RAW = "${{ github.event.inputs.end_message_id }}"
          END = int(END_RAW) if END_RAW.strip() else None

          BASE = "saved_files"
          used_names = {}

          def remove_emojis(t):
              if not t: return ""
              t = re.sub(r'[⚛️😱👤🆔▶️◀️✅🔹🔸📢💡📌📺🔗📱]', '', t)
              t = re.sub(r'[\U00010000-\U0010ffff]', '', t)
              return t.strip()

          def clean_folder(t):
              if not t: return ""
              t = remove_emojis(t)
              t = re.sub(r'[^\w\s\u0600-\u06FF]', '', t)
              t = t.strip().replace(' ', '_')
              t = re.sub(r'_+', '_', t)
              return t[:50]

          def clean_file(t):
              if not t: return ""
              t = remove_emojis(t)
              t = re.sub(r'[\\/*?:"<>|]', '', t)
              t = t.strip().replace(' ', '_')
              t = re.sub(r'_+', '_', t)
              return t[:80]

          def get_folder_and_name(msg):
              text = msg.text or msg.message or ""
              if not text:
                  return '_no_tag', None
              lines = text.strip().split('\n')
              
              # پوشه
              folder_parts = []
              if lines:
                  folder_parts.append(clean_folder(lines[0]))
              for line in lines[1:]:
                  if 'مدرس' in line: break
                  cl = remove_emojis(line)
                  if cl.startswith('دوره'):
                      folder_parts.append(clean_folder(cl))
              folder = '_'.join(folder_parts) if folder_parts else '_no_tag'
              
              # فایل
              file_parts = []
              for i, line in enumerate(lines):
                  if 'مدرس' in line: break
                  if i == 0: continue
                  cl = remove_emojis(line)
                  if cl and not cl.startswith('دوره'):
                      file_parts.append(clean_file(cl))
              fname = '_'.join(file_parts) if file_parts else None
              return folder, fname

          # ========== تابع نمایش پیشرفت دانلود ==========
          def progress_callback(current, total):
              """نمایش نوار پیشرفت و درصد دانلود"""
              if total > 0:
                  percent = (current / total) * 100
                  bar_length = 25
                  filled_length = int(bar_length * current // total)
                  bar = '█' * filled_length + '░' * (bar_length - filled_length)
                  
                  # نمایش در یک خط با بازنویسی
                  output = f'\r    ⬇️  [{bar}] {percent:.1f}% ({current//1024//1024}MB/{total//1024//1024}MB)'
                  # محدود کردن طول خروجی برای خطاهای احتمالی
                  if len(output) > 200:
                      output = f'\r    ⬇️  {percent:.1f}% ({current//1024//1024}/{total//1024//1024}MB)'
                  sys.stdout.write(output)
                  sys.stdout.flush()
              else:
                  sys.stdout.write(f'\r    ⬇️  دانلود... ({current//1024//1024}MB)')
                  sys.stdout.flush()

          async def main():
              async with TelegramClient(StringSession(STRING_SESSION), API_ID, API_HASH) as client:
                  me = await client.get_me()
                  print(f"✅ {me.first_name}")
                  entity = await client.get_entity(CHAT)
                  print(f"🎯 {entity.title if hasattr(entity,'title') else entity.id}")
                  
                  os.makedirs(BASE, exist_ok=True)
                  new = 0
                  failed = 0
                  checked = 0
                  video_count = 0
                  
                  print("🎬 Downloading ONLY VIDEO files...")
                  print("📊 Progress bar shows download status for each file")
                  print("")
                  
                  async for msg in client.iter_messages(entity, min_id=START, max_id=END, reverse=True):
                      checked += 1
                      if checked % 100 == 0:
                          print(f"\n📊 Processed {checked} msgs, {video_count} videos found, {new} downloaded, {failed} failed")
                      
                      # فقط ویدیو
                      if not msg.video:
                          continue
                      
                      video_count += 1
                      
                      folder, fname = get_folder_and_name(msg)
                      if not fname:
                          orig = getattr(msg.file, 'name', None)
                          if orig:
                              fname = clean_file(os.path.splitext(orig)[0])
                          else:
                              fname = f"video_{msg.id}"
                      
                      if fname in used_names:
                          used_names[fname] += 1
                          fname = f"{fname}_{used_names[fname]}"
                      else:
                          used_names[fname] = 1
                      
                      fname = fname + '.mp4'
                      path = os.path.join(BASE, folder, fname)
                      os.makedirs(os.path.dirname(path), exist_ok=True)
                      
                      if not os.path.exists(path):
                          try:
                              # دریافت حجم فایل برای نمایش
                              file_size = msg.file.size if msg.file else 0
                              if file_size:
                                  print(f"\n⬇️  [{new+1}] {folder}/{fname} ({file_size//1024//1024}MB)")
                              else:
                                  print(f"\n⬇️  [{new+1}] {folder}/{fname}")
                              
                              # دانلود با نمایش پیشرفت
                              await msg.download_media(
                                  file=path,
                                  progress_callback=progress_callback
                              )
                              print(f"\n✅ Done! ({fname})")
                              print("")
                              new += 1
                              await asyncio.sleep(2)
                              if new % 10 == 0:
                                  print("⏸️ 10s break...")
                                  await asyncio.sleep(10)
                          except Exception as e:
                              failed += 1
                              if "too long" in str(e):
                                  short = f"video_{msg.id}.mp4"
                                  short_path = os.path.join(BASE, folder, short)
                                  try:
                                      print(f"\n⬇️  Retry with short name: {short}")
                                      await msg.download_media(
                                          file=short_path,
                                          progress_callback=progress_callback
                                      )
                                      print(f"\n✅ Done (shortened)")
                                      new += 1
                                      await asyncio.sleep(2)
                                  except Exception as e2:
                                      print(f"\n❌ Failed {msg.id}: {e2}")
                              else:
                                  print(f"\n❌ {msg.id}: {str(e)[:80]}")
                      else:
                          print(f"⏩ Already exists: {fname}")
                  
                  print(f"\n" + "="*50)
                  print(f"🎉 Complete!")
                  print(f"📊 Total messages checked: {checked}")
                  print(f"🎬 Videos found: {video_count}")
                  print(f"💾 Downloaded: {new}")
                  print(f"❌ Failed: {failed}")
                  print("="*50)

          asyncio.run(main())
          EOF

      - name: Run
        env:
          API_ID: ${{ github.event.inputs.api_id }}
          API_HASH: ${{ github.event.inputs.api_hash }}
          STRING_SESSION: ${{ github.event.inputs.string_session }}
        run: python download.py

      - name: Zip
        if: success()
        run: |
          for folder in saved_files/*/; do
            name=$(basename "$folder")
            cd saved_files
            zip -r -s 45m "${name}.zip" "$name" && rm -rf "$name"
            cd ..
          done

      - name: Push
        if: success()
        run: |
          git add saved_files/
          git commit -m "Video backup $(date -u '+%Y-%m-%d')" || true
          git push
