name: 📥 Telegram Chat Downloader

on:
  workflow_dispatch:
    inputs:
      api_id:
        description: '🔑 API ID (از my.telegram.org)'
        required: true
        type: string
      api_hash:
        description: '🔐 API HASH (از my.telegram.org)'
        required: true
        type: string
      string_session:
        description: '📱 String Session'
        required: true
        type: string
      chat_target:
        description: '🎯 آیدی یا یوزرنیم (برای Saved Messages: me)'
        required: true
        type: string
        default: 'me'
      start_message_id:
        description: '🔢 از شماره پیام (0 = ابتدا)'
        required: false
        default: '0'
        type: string
      end_message_id:
        description: '🔢 تا شماره پیام (خالی = تا آخر)'
        required: false
        default: ''
        type: string
      zip_password:
        description: '🔒 رمز فایل‌های زیپ (اختیاری)'
        required: false
        default: ''
        type: string

jobs:
  backup:
    runs-on: ubuntu-latest
    timeout-minutes: 360
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Configure Git
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "github-actions@github.com"
          git config --global pull.rebase true

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: pip install telethon

      - name: Create download script
        run: |
          cat > download_chat.py << 'EOF'
          import os
          import sys
          import re
          import asyncio
          from telethon import TelegramClient
          from telethon.sessions import StringSession

          print("=== SCRIPT STARTED ===")

          # خواندن از متغیرهای محیطی
          API_ID = int(os.environ.get('API_ID', 0))
          API_HASH = os.environ.get('API_HASH', '')
          STRING_SESSION = os.environ.get('STRING_SESSION', '')
          CHAT_TARGET = os.environ.get('CHAT_TARGET', 'me')
          START_ID = int(os.environ.get('START_ID', '0'))
          END_ID_RAW = os.environ.get('END_ID', '')
          END_ID = int(END_ID_RAW) if END_ID_RAW and END_ID_RAW.strip() else None

          print(f"API_ID: {API_ID}")
          print(f"API_HASH: {API_HASH[:10] if API_HASH else 'MISSING'}...")
          print(f"STRING_SESSION: {STRING_SESSION[:15] if STRING_SESSION else 'MISSING'}...")
          print(f"CHAT_TARGET: {CHAT_TARGET}")
          print(f"START_ID: {START_ID}")

          if not API_ID or not API_HASH or not STRING_SESSION:
              print("❌ ERROR: Missing required credentials!")
              sys.exit(1)

          BASE_DIR = 'saved_files'

          def remove_emojis(text):
              """حذف ایموجی‌ها و کاراکترهای خاص"""
              if not text:
                  return ""
              # حذف ایموجی‌های مشخص
              text = re.sub(r'[⚛️😱👤🆔▶️◀️✅🔹🔸📢💡📌📺🔗📱🆔]', '', text)
              # حذف ایموجی‌های یونیکد
              text = re.sub(r'[\U00010000-\U0010ffff]', '', text)
              return text.strip()

          def clean_for_folder(text):
              """پاکسازی متن برای نام پوشه"""
              if not text:
                  return ""
              text = remove_emojis(text)
              text = re.sub(r'[^\w\s\u0600-\u06FF]', '', text)
              text = text.strip().replace(' ', '_')
              text = re.sub(r'_+', '_', text)
              return text[:50]

          def clean_for_filename(text):
              """پاکسازی متن برای نام فایل"""
              if not text:
                  return ""
              text = remove_emojis(text)
              text = re.sub(r'[\\/*?:"<>|]', '', text)
              text = text.strip().replace(' ', '_')
              text = re.sub(r'_+', '_', text)
              return text[:80]

          def extract_folder_and_filename(message):
              """استخراج نام پوشه و فایل از متن پیام"""
              text = message.text or message.message or ""
              if not text:
                  return '_no_tag', None
              
              lines = text.strip().split('\n')
              
              # ========== ساخت نام پوشه ==========
              folder_parts = []
              
              # خط اول به پوشه اضافه می‌شود
              if lines:
                  first_line = lines[0].strip()
                  folder_parts.append(clean_for_folder(first_line))
              
              # خطوطی که با "دوره" شروع می‌شوند به پوشه اضافه می‌شوند
              for line in lines[1:]:
                  if 'مدرس' in line or line.startswith('👤مدرس'):
                      break
                  clean_line = remove_emojis(line)
                  if clean_line.startswith('دوره'):
                      folder_parts.append(clean_for_folder(clean_line))
              
              folder = '_'.join(folder_parts) if folder_parts else '_no_tag'
              if not folder:
                  folder = '_no_tag'
              
              # ========== ساخت نام فایل ==========
              filename_parts = []
              
              # خطوطی که با "دوره" شروع نمی‌شوند و خط اول نیستند
              for i, line in enumerate(lines):
                  if 'مدرس' in line or line.startswith('👤مدرس'):
                      break
                  if i == 0:  # رد کردن خط اول
                      continue
                  clean_line = remove_emojis(line)
                  if clean_line and not clean_line.startswith('دوره'):
                      filename_parts.append(clean_for_filename(clean_line))
              
              filename = '_'.join(filename_parts) if filename_parts else None
              
              return folder, filename

          def get_file_extension(message):
              """دریافت پسوند صحیح فایل"""
              if hasattr(message.media, 'photo'):
                  return '.jpg'
              if hasattr(message.media, 'document'):
                  mime = getattr(message.media.document, 'mime_type', '')
                  if 'video' in mime:
                      return '.mp4'
                  elif 'image' in mime:
                      return '.jpg'
                  elif 'audio' in mime:
                      return '.mp3'
              return '.mp4'

          async def main():
              print("=== Connecting to Telegram ===")
              async with TelegramClient(StringSession(STRING_SESSION), API_ID, API_HASH) as client:
                  print("✓ Client created")
                  
                  try:
                      me = await client.get_me()
                      print(f"✓ Logged in as: {me.first_name}")
                  except Exception as e:
                      print(f"❌ Login failed: {e}")
                      return

                  try:
                      entity = await client.get_entity(CHAT_TARGET)
                      name = entity.title if hasattr(entity, 'title') else str(entity.id)
                      print(f"✅ Target: {name}")
                  except Exception as e:
                      print(f"❌ Cannot access chat: {e}")
                      return

                  os.makedirs(BASE_DIR, exist_ok=True)
                  new_count = 0
                  msg_count = 0
                  used_names = {}  # برای جلوگیری از نام‌های تکراری

                  min_id = START_ID if START_ID > 0 else 0
                  print(f"Starting from message ID: {min_id}")

                  async for msg in client.iter_messages(entity, min_id=min_id, max_id=END_ID, reverse=True):
                      msg_count += 1
                      if msg_count % 100 == 0:
                          print(f"📊 Processed {msg_count} messages...")

                      if not msg.media:
                          continue

                      # دریافت نام پوشه و فایل
                      folder, filename = extract_folder_and_filename(msg)
                      
                      # اگر اسم فایل پیدا نشد، از اسم اصلی استفاده کن
                      if not filename:
                          orig = getattr(msg.file, 'name', None)
                          if orig:
                              base = os.path.splitext(orig)[0]
                              filename = clean_for_filename(base)
                          else:
                              filename = f"msg_{msg.id}"
                      
                      # جلوگیری از نام تکراری
                      if filename in used_names:
                          used_names[filename] += 1
                          filename = f"{filename}_{used_names[filename]}"
                      else:
                          used_names[filename] = 1
                      
                      # اضافه کردن پسوند
                      ext = get_file_extension(msg)
                      filename = filename + ext
                      
                      # ساخت مسیر کامل
                      folder_path = os.path.join(BASE_DIR, folder)
                      os.makedirs(folder_path, exist_ok=True)
                      file_path = os.path.join(folder_path, filename)
                      
                      # دانلود فایل
                      if not os.path.exists(file_path):
                          try:
                              await msg.download_media(file=file_path)
                              print(f"✅ [{new_count+1}] {folder}/{filename}")
                              new_count += 1
                          except Exception as e:
                              if "too long" in str(e) or "Name too long" in str(e):
                                  # استفاده از نام کوتاه‌تر
                                  short_name = f"msg_{msg.id}{ext}"
                                  short_path = os.path.join(folder_path, short_name)
                                  try:
                                      await msg.download_media(file=short_path)
                                      print(f"✅ [{new_count+1}] {folder}/{short_name} (shortened)")
                                      new_count += 1
                                  except Exception as e2:
                                      print(f"❌ Failed msg {msg.id}: {e2}")
                              else:
                                  print(f"❌ Failed msg {msg.id}: {e}")
                      else:
                          print(f"⏩ Already exists: {filename}")

                  print(f"\n🎉 Complete!")
                  print(f"📊 Total messages checked: {msg_count}")
                  print(f"💾 New files downloaded: {new_count}")

          if __name__ == '__main__':
              try:
                  asyncio.run(main())
              except Exception as e:
                  print(f"❌ Fatal error: {e}")
                  import traceback
                  traceback.print_exc()
                  sys.exit(1)
          EOF
          
          echo "✓ Script created"

      - name: Run download script
        env:
          API_ID: ${{ github.event.inputs.api_id }}
          API_HASH: ${{ github.event.inputs.api_hash }}
          STRING_SESSION: ${{ github.event.inputs.string_session }}
          CHAT_TARGET: ${{ github.event.inputs.chat_target }}
          START_ID: ${{ github.event.inputs.start_message_id }}
          END_ID: ${{ github.event.inputs.end_message_id }}
        run: |
          echo "=== Starting download ==="
          python download_chat.py
          echo "=== Download finished ==="

      - name: Zip, split & create README
        if: success()
        env:
          ZIP_PASSWORD: ${{ github.event.inputs.zip_password }}
        run: |
          BASE_DIR="saved_files"
          SPLIT_SIZE=45
          REPO_OWNER="${{ github.repository_owner }}"
          REPO_NAME="${{ github.event.repository.name }}"
          BRANCH="${GITHUB_REF_NAME}"

          if [ ! -d "$BASE_DIR" ]; then
            echo "No files found"
            exit 0
          fi

          urlencode() { python3 -c "import urllib.parse,sys; print(urllib.parse.quote(sys.argv[1]))" "$1"; }

          for folder in "$BASE_DIR"/*/ ; do
            [ -d "$folder" ] || continue
            name=$(basename "$folder")
            echo "📦 Zipping: $name"

            cd "$BASE_DIR"
            rm -f "${name}.zip" "${name}.z"* 2>/dev/null
            if [ -n "$ZIP_PASSWORD" ]; then
              zip -r -P "$ZIP_PASSWORD" -s ${SPLIT_SIZE}m "${name}.zip" "$name"
            else
              zip -r -s ${SPLIT_SIZE}m "${name}.zip" "$name"
            fi
            rm -rf "$name"
            cd ../..

            # ساخت README
            readme="$BASE_DIR/${name}_README.md"
            echo "# $name" > "$readme"
            echo "" >> "$readme"
            echo "| # | Part | Download |" >> "$readme"
            echo "|---|------|----------|" >> "$readme"
            
            count=1
            for part in $(ls "$BASE_DIR/${name}.zip" "$BASE_DIR/${name}.z"* 2>/dev/null | sort); do
              bname=$(basename "$part")
              enc=$(urlencode "$bname")
              link="https://github.com/${REPO_OWNER}/${REPO_NAME}/raw/${BRANCH}/saved_files/${enc}"
              echo "| $count | \`$bname\` | [Download]($link) |" >> "$readme"
              count=$((count+1))
            done
            echo "✅ $name → $((count-1)) parts"
          done

      - name: Commit and push
        if: success()
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git pull --rebase origin ${GITHUB_REF_NAME} --no-edit || true
          git add saved_files/
          git diff --quiet && git diff --staged --quiet || git commit -m "Backup $(date -u '+%Y-%m-%d %H:%M:%S')"
          git push
