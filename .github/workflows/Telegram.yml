name: 📥 Telegram Video Downloader (Debug)

on:
  workflow_dispatch:
    inputs:
      api_id:
        description: '🔑 API ID'
        required: true
        type: string
      api_hash:
        description: '🔐 API HASH'
        required: true
        type: string
      string_session:
        description: '📱 String Session'
        required: true
        type: string
      chat_target:
        description: '🎯 هدف (برای Saved Messages: me)'
        required: true
        type: string
        default: 'me'
      start_id:
        description: '🔢 شروع از Message ID'
        required: true
        type: string
        default: '553189'
      end_id:
        description: '🔢 تا Message ID'
        required: false
        type: string
        default: ''
      zip_password:
        description: '🔒 رمز فایل‌های زیپ'
        required: false
        default: ''

jobs:
  backup:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "actions@github.com"

      - uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - run: pip install telethon

      - name: Test connection first
        env:
          API_ID: ${{ github.event.inputs.api_id }}
          API_HASH: ${{ github.event.inputs.api_hash }}
          STRING_SESSION: ${{ github.event.inputs.string_session }}
        run: |
          cat > test.py << 'EOF'
          import asyncio
          from telethon import TelegramClient
          from telethon.sessions import StringSession
          import os

          async def main():
              print("1️⃣ Testing connection...")
              API_ID = int(os.environ['API_ID'])
              API_HASH = os.environ['API_HASH']
              STRING_SESSION = os.environ['STRING_SESSION']
              
              print("2️⃣ Creating client...")
              client = TelegramClient(StringSession(STRING_SESSION), API_ID, API_HASH)
              
              print("3️⃣ Connecting...")
              await client.connect()
              
              print("4️⃣ Checking authorization...")
              if not await client.is_user_authorized():
                  print("❌ NOT authorized! StringSession may be invalid.")
                  return
              
              print("5️⃣ Getting me...")
              me = await client.get_me()
              print(f"✅ Authorized as: {me.first_name} (ID: {me.id})")
              
              print("6️⃣ Getting saved messages...")
              entity = await client.get_entity('me')
              print(f"✅ Entity: {entity.title if hasattr(entity,'title') else entity.id}")
              
              print("7️⃣ Getting last message...")
              last_msg = await client.get_messages(entity, limit=1)
              if last_msg:
                  print(f"✅ Last message ID: {last_msg[0].id}")
              
              print("🎉 Connection test passed!")
              await client.disconnect()
          
          asyncio.run(main())
          EOF
          python test.py

      - name: Download videos
        env:
          API_ID: ${{ github.event.inputs.api_id }}
          API_HASH: ${{ github.event.inputs.api_hash }}
          STRING_SESSION: ${{ github.event.inputs.string_session }}
          CHAT: ${{ github.event.inputs.chat_target }}
          START_ID: ${{ github.event.inputs.start_id }}
          END_ID: ${{ github.event.inputs.end_id }}
        run: |
          cat > download.py << 'EOF'
          import os, re, asyncio
          from telethon import TelegramClient
          from telethon.sessions import StringSession
          from telethon.errors import FloodWaitError

          print("="*50)
          print("STARTING DOWNLOADER")
          print("="*50)

          API_ID = int(os.environ['API_ID'])
          API_HASH = os.environ['API_HASH']
          STRING_SESSION = os.environ['STRING_SESSION']
          CHAT = os.environ.get('CHAT', 'me')
          START_ID = int(os.environ.get('START_ID', '553189'))
          END_ID_RAW = os.environ.get('END_ID', '')
          END_ID = int(END_ID_RAW) if END_ID_RAW and END_ID_RAW.strip() else None

          print(f"API_ID: {API_ID}")
          print(f"API_HASH: {API_HASH[:10]}...")
          print(f"CHAT: {CHAT}")
          print(f"START_ID: {START_ID}")
          print(f"END_ID: {END_ID}")
          print("")

          BASE = "saved_files"
          used_names = {}

          def remove_emojis(t):
              if not t: return ""
              t = re.sub(r'[⚛️😱👤🆔▶️◀️✅🔹🔸📢💡📌📺🔗📱]', '', t)
              t = re.sub(r'[\U00010000-\U0010ffff]', '', t)
              return t.strip()

          def clean_folder(t):
              if not t: return ""
              t = remove_emojis(t)
              t = re.sub(r'[^\w\s\u0600-\u06FF]', '', t)
              t = t.strip().replace(' ', '_')
              t = re.sub(r'_+', '_', t)
              return t[:50]

          def clean_file(t):
              if not t: return ""
              t = remove_emojis(t)
              t = re.sub(r'[\\/*?:"<>|]', '', t)
              t = t.strip().replace(' ', '_')
              t = re.sub(r'_+', '_', t)
              return t[:80]

          def get_folder_and_name(msg):
              text = msg.text or msg.message or ""
              if not text:
                  return '_no_tag', None
              lines = text.strip().split('\n')
              
              folder_parts = []
              if lines:
                  folder_parts.append(clean_folder(lines[0]))
              for line in lines[1:]:
                  if 'مدرس' in line: break
                  cl = remove_emojis(line)
                  if cl.startswith('دوره'):
                      folder_parts.append(clean_folder(cl))
              folder = '_'.join(folder_parts) if folder_parts else '_no_tag'
              
              file_parts = []
              for i, line in enumerate(lines):
                  if 'مدرس' in line: break
                  if i == 0: continue
                  cl = remove_emojis(line)
                  if cl and not cl.startswith('دوره'):
                      file_parts.append(clean_file(cl))
              fname = '_'.join(file_parts) if file_parts else None
              return folder, fname

          async def main():
              print("Creating client...")
              client = TelegramClient(StringSession(STRING_SESSION), API_ID, API_HASH)
              
              print("Connecting...")
              await client.connect()
              
              print("Checking authorization...")
              if not await client.is_user_authorized():
                  print("❌ Not authorized! Invalid StringSession.")
                  return
              
              print("Getting me...")
              me = await client.get_me()
              print(f"✅ Logged in as: {me.first_name}")
              
              print("Getting entity...")
              entity = await client.get_entity(CHAT)
              print(f"✅ Target: {entity.title if hasattr(entity,'title') else entity.id}")
              
              os.makedirs(BASE, exist_ok=True)
              new = 0
              failed = 0
              checked = 0
              
              print(f"\n📊 Scanning messages from {START_ID} to {END_ID if END_ID else 'END'}...\n")
              
              try:
                  async for msg in client.iter_messages(entity, min_id=START_ID, max_id=END_ID, reverse=True):
                      checked += 1
                      if checked % 50 == 0:
                          print(f"📊 Scanned {checked} messages | Downloaded: {new}")
                      
                      if not msg.video:
                          continue
                      
                      folder, fname = get_folder_and_name(msg)
                      if not fname:
                          orig = getattr(msg.file, 'name', None)
                          if orig:
                              fname = clean_file(os.path.splitext(orig)[0])
                          else:
                              fname = f"video_{msg.id}"
                      
                      if fname in used_names:
                          used_names[fname] += 1
                          fname = f"{fname}_{used_names[fname]}"
                      else:
                          used_names[fname] = 1
                      
                      fname = fname + '.mp4'
                      path = os.path.join(BASE, folder, fname)
                      os.makedirs(os.path.dirname(path), exist_ok=True)
                      
                      if not os.path.exists(path):
                          try:
                              print(f"⬇️ [{new+1}] {folder}/{fname}")
                              await msg.download_media(file=path)
                              new += 1
                              print(f"✅ Done! (ID: {msg.id})")
                              await asyncio.sleep(1)
                          except FloodWaitError as e:
                              print(f"⏳ Flood wait: {e.seconds} seconds")
                              await asyncio.sleep(e.seconds)
                          except Exception as e:
                              failed += 1
                              print(f"❌ Failed: {str(e)[:80]}")
                      else:
                          print(f"⏩ Already exists: {fname}")
              except Exception as e:
                  print(f"❌ Fatal error: {e}")
                  import traceback
                  traceback.print_exc()
              
              print("\n" + "="*50)
              print(f"🎉 Complete! Scanned: {checked}, Downloaded: {new}, Failed: {failed}")
              print("="*50)
              await client.disconnect()

          asyncio.run(main())
          EOF
          python download.py

      - name: Zip and push
        if: success()
        run: |
          echo "Zipping files..."
          for folder in saved_files/*/; do
            name=$(basename "$folder")
            cd saved_files
            zip -r -s 45m "${name}.zip" "$name" && rm -rf "$name"
            cd ..
            sleep 2
          done

          echo "Pushing to GitHub..."
          git add saved_files/
          git diff --cached --quiet || git commit -m "Video backup $(date -u '+%Y-%m-%d %H:%M:%S')"
          
          for i in 1 2 3 4 5; do
            if git push origin HEAD:"${GITHUB_REF_NAME}"; then
              echo "✅ Push successful!"
              break
            else
              echo "⚠️ Push failed, retry $i/5 in 10 seconds..."
              sleep 10
              git fetch origin && git rebase origin/"${GITHUB_REF_NAME}" || true
            fi
          done
