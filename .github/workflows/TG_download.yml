name: 📥 Telegram Chat Downloader (Fixed)

on:
  workflow_dispatch:
    inputs:
      chat_target:
        description: '🎯 آیدی یا یوزرنیم کانال/گروه (برای Saved Messages: me)'
        required: true
        type: string
        default: 'me'
      start_message_id:
        description: '🔢 از شماره پیام (0 = ابتدای چت)'
        required: false
        default: '0'
        type: string
      end_message_id:
        description: '🔢 تا شماره پیام (خالی = تا آخر)'
        required: false
        default: ''
        type: string
      zip_password:
        description: '🔒 رمز فایل‌های زیپ (اختیاری)'
        required: false
        default: ''
        type: string

jobs:
  backup:
    runs-on: ubuntu-latest
    timeout-minutes: 120
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Configure Git
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "github-actions@github.com"

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: pip install telethon

      - name: Create download script
        run: |
          cat > download_chat.py << 'EOF'
          import os
          import sys
          import re
          import asyncio
          from telethon import TelegramClient
          from telethon.sessions import StringSession
          from telethon.errors import UsernameNotOccupiedError, ChannelPrivateError

          print("=== SCRIPT STARTED ===")
          print(f"Python version: {sys.version}")

          # خواندن متغیرهای محیطی - بدون استفاده از int() روی مقدار مخفی شده
          api_id_str = os.environ.get('API_ID', '')
          api_hash = os.environ.get('API_HASH', '')
          string_session = os.environ.get('STRING_SESSION', '')
          chat_target = os.environ.get('CHAT_TARGET', '')
          start_id_str = os.environ.get('START_ID', '0')
          end_id_str = os.environ.get('END_ID', '')

          # تبدیل به عدد
          try:
              API_ID = int(api_id_str) if api_id_str else 0
          except ValueError:
              print(f"❌ ERROR: Invalid API_ID: {api_id_str}")
              sys.exit(1)

          try:
              START_ID = int(start_id_str) if start_id_str else 0
          except ValueError:
              START_ID = 0

          END_ID = None
          if end_id_str and end_id_str.strip():
              try:
                  END_ID = int(end_id_str)
              except ValueError:
                  END_ID = None

          print(f"API_ID: {'SET' if API_ID else 'MISSING'}")
          print(f"API_HASH: {'SET' if api_hash else 'MISSING'}")
          print(f"STRING_SESSION: {'SET' if string_session else 'MISSING'}")
          print(f"CHAT_TARGET: {chat_target}")
          print(f"START_ID: {START_ID}")
          print(f"END_ID: {END_ID}")

          if not API_ID or not api_hash or not string_session:
              print("❌ ERROR: Missing required environment variables!")
              print("Please check your GitHub Secrets: TG_API_ID, TG_API_HASH, TG_STRING_SESSION")
              sys.exit(1)

          BASE_DIR = 'saved_files'

          def extract_folder_and_filename(text):
              if not text:
                  return None, None
              hashtag_match = re.search(r'#(\w+)', text)
              folder_name = hashtag_match.group(1) if hashtag_match else '_no_tag'
              tick_match = re.search(r'✅([^#]+)', text)
              if tick_match:
                  raw = tick_match.group(1).strip()
                  safe = re.sub(r'[\\/*?:"<>|]', '-', raw).strip()
                  return folder_name, safe if safe else None
              return folder_name, None

          async def main():
              print("=== Connecting to Telegram ===")
              async with TelegramClient(StringSession(string_session), API_ID, api_hash) as client:
                  print("✓ Client created")
                  
                  try:
                      me = await client.get_me()
                      print(f"✓ Logged in as: {me.first_name} (ID: {me.id})")
                  except Exception as e:
                      print(f"❌ Failed to get user info: {e}")
                      return

                  try:
                      print(f"Looking for chat: {chat_target}")
                      entity = await client.get_entity(chat_target)
                      name = entity.title if hasattr(entity, 'title') else str(entity.id)
                      print(f"✅ Connected to: {name}")
                  except (UsernameNotOccupiedError, ValueError) as e:
                      print(f"❌ Invalid chat: {chat_target} - Error: {e}")
                      return
                  except ChannelPrivateError as e:
                      print(f"❌ Cannot access private channel: {e}")
                      return
                  except Exception as e:
                      print(f"❌ Unexpected error getting entity: {e}")
                      return

                  os.makedirs(BASE_DIR, exist_ok=True)
                  print(f"✓ Base directory: {BASE_DIR}")
                  new = 0
                  total_messages = 0

                  min_id = START_ID if START_ID > 0 else 0
                  max_id = END_ID if END_ID else 0
                  print(f"Message range: min_id={min_id}, max_id={max_id if max_id else 'unlimited'}")

                  try:
                      async for msg in client.iter_messages(entity, min_id=min_id, max_id=max_id, reverse=True):
                          total_messages += 1
                          if total_messages % 100 == 0:
                              print(f"📊 Processed {total_messages} messages so far...")
                          
                          if END_ID and msg.id > END_ID:
                              break
                          if not msg.media:
                              continue

                          text = msg.text or msg.caption or ""
                          folder, fname = extract_folder_and_filename(text)

                          if not fname:
                              orig = getattr(msg.file, 'name', None)
                              if orig:
                                  fname = os.path.basename(orig)
                              else:
                                  ext = msg.file.ext or '.bin'
                                  fname = f"{msg.id}{ext}"

                          folder_path = os.path.join(BASE_DIR, folder)
                          os.makedirs(folder_path, exist_ok=True)

                          ext = msg.file.ext or ''
                          if ext and not fname.endswith(ext):
                              fname += ext

                          path = os.path.join(folder_path, fname)
                          if not os.path.exists(path):
                              try:
                                  await msg.download_media(file=path)
                                  print(f"✅ {folder}/{fname} (msg {msg.id})")
                                  new += 1
                              except Exception as e:
                                  print(f"❌ msg {msg.id}: {e}")
                          else:
                              print(f"⏩ {path} exists (already downloaded)")

                  except Exception as e:
                      print(f"❌ Error during message iteration: {e}")
                      return

                  print(f"\n🎉 Done! Total messages checked: {total_messages}, New files downloaded: {new}")

          if __name__ == '__main__':
              try:
                  asyncio.run(main())
              except Exception as e:
                  print(f"❌ Fatal error: {e}")
                  import traceback
                  traceback.print_exc()
                  sys.exit(1)
          EOF
          echo "✓ Script created"

      - name: Run download script
        env:
          API_ID: ${{ secrets.TG_API_ID }}
          API_HASH: ${{ secrets.TG_API_HASH }}
          STRING_SESSION: ${{ secrets.TG_STRING_SESSION }}
          CHAT_TARGET: ${{ github.event.inputs.chat_target }}
          START_ID: ${{ github.event.inputs.start_message_id }}
          END_ID: ${{ github.event.inputs.end_message_id }}
        run: |
          echo "=== Running download script ==="
          python download_chat.py
          echo "=== Script finished ==="

      - name: Zip, split & create README
        if: success()
        env:
          ZIP_PASSWORD: ${{ github.event.inputs.zip_password }}
        run: |
          echo "=== Starting Zip & Split ==="
          BASE_DIR="saved_files"
          SPLIT_THRESHOLD_MB=45
          REPO_OWNER="${{ github.repository_owner }}"
          REPO_NAME="${{ github.event.repository.name }}"
          BRANCH="${GITHUB_REF_NAME}"

          if [ ! -d "$BASE_DIR" ]; then
            echo "No saved_files directory. Exiting."
            exit 0
          fi

          urlencode() { python3 -c "import urllib.parse,sys; print(urllib.parse.quote(sys.argv[1], safe=''))" "$1"; }

          for folder in "$BASE_DIR"/*/ ; do
            [ -d "$folder" ] || continue
            foldername=$(basename "$folder")
            echo "Processing folder: $foldername"

            cd "$BASE_DIR"
            rm -f "${foldername}.zip" "${foldername}.z"* 2>/dev/null || true
            if [ -n "$ZIP_PASSWORD" ]; then
              zip -r -P "$ZIP_PASSWORD" -s ${SPLIT_THRESHOLD_MB}m "${foldername}.zip" "$foldername"
            else
              zip -r -s ${SPLIT_THRESHOLD_MB}m "${foldername}.zip" "$foldername"
            fi
            rm -rf "$foldername"
            cd ../..

            final_readme="$BASE_DIR/${foldername}_README.md"
            echo "# Archive: $foldername" > "$final_readme"
            echo "" >> "$final_readme"
            echo "| # | Part | Download |" >> "$final_readme"
            echo "|---|------|----------|" >> "$final_readme"
            link_counter=1
            for part in $(ls "$BASE_DIR/${foldername}.zip" "$BASE_DIR/${foldername}.z"* 2>/dev/null | sort); do
              part_basename=$(basename "$part")
              part_encoded=$(urlencode "$part_basename")
              raw_link="https://github.com/${REPO_OWNER}/${REPO_NAME}/raw/${BRANCH}/saved_files/${part_encoded}"
              echo "| $link_counter | \`$part_basename\` | [Download]($raw_link) |" >> "$final_readme"
              link_counter=$((link_counter+1))
            done
            echo "✅ $foldername → $((link_counter-1)) parts"
          done

      - name: Commit and push
        if: success()
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add saved_files/
          git diff --quiet && git diff --staged --quiet || git commit -m "Backup from chat $(date -u '+%Y-%m-%d %H:%M:%S')"
          git push
