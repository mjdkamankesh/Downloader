name: 📥 Telegram Chat Downloader

on:
  workflow_dispatch:
    inputs:
      chat_target:
        description: '🎯 آیدی یا یوزرنیم کانال/گروه (برای Saved Messages: me)'
        required: true
        type: string
        default: 'me'
      start_message_id:
        description: '🔢 از شماره پیام (0 = ابتدای چت)'
        required: false
        default: '0'
        type: string
      end_message_id:
        description: '🔢 تا شماره پیام (خالی = تا آخر)'
        required: false
        default: ''
        type: string
      zip_password:
        description: '🔒 رمز فایل‌های زیپ (اختیاری)'
        required: false
        default: ''
        type: string

jobs:
  backup:
    runs-on: ubuntu-latest
    timeout-minutes: 120
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Configure Git
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "github-actions@github.com"

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: pip install telethon

      - name: Create secrets file
        run: |
          echo "TG_API_ID=${{ secrets.TG_API_ID }}" >> secrets.env
          echo "TG_API_HASH=${{ secrets.TG_API_HASH }}" >> secrets.env
          echo "TG_STRING_SESSION=${{ secrets.TG_STRING_SESSION }}" >> secrets.env
          echo "Secrets file created"

      - name: Download from Telegram
        run: |
          # دانلود اسکریپت از مخزن خودت (باید فایل download_chat.py رو قبلاً در مخنت بگذاری)
          python download_chat.py
        env:
          CHAT_TARGET: ${{ github.event.inputs.chat_target }}
          START_ID: ${{ github.event.inputs.start_message_id }}
          END_ID: ${{ github.event.inputs.end_message_id }}

      - name: Zip, split & create README
        if: success()
        env:
          ZIP_PASSWORD: ${{ github.event.inputs.zip_password }}
        run: |
          BASE_DIR="saved_files"
          SPLIT_THRESHOLD_MB=45
          REPO_OWNER="${{ github.repository_owner }}"
          REPO_NAME="${{ github.event.repository.name }}"
          BRANCH="${GITHUB_REF_NAME}"

          if [ ! -d "$BASE_DIR" ]; then
            echo "No saved_files directory. Exiting."
            exit 0
          fi

          urlencode() { python3 -c "import urllib.parse,sys; print(urllib.parse.quote(sys.argv[1], safe=''))" "$1"; }

          for folder in "$BASE_DIR"/*/ ; do
            [ -d "$folder" ] || continue
            foldername=$(basename "$folder")
            echo "Processing folder: $foldername"

            cd "$BASE_DIR"
            rm -f "${foldername}.zip" "${foldername}.z"* 2>/dev/null || true
            if [ -n "$ZIP_PASSWORD" ]; then
              zip -r -P "$ZIP_PASSWORD" -s ${SPLIT_THRESHOLD_MB}m "${foldername}.zip" "$foldername"
            else
              zip -r -s ${SPLIT_THRESHOLD_MB}m "${foldername}.zip" "$foldername"
            fi
            rm -rf "$foldername"
            cd ../..

            final_readme="$BASE_DIR/${foldername}_README.md"
            echo "# Archive: $foldername" > "$final_readme"
            echo "" >> "$final_readme"
            echo "| # | Part | Download |" >> "$final_readme"
            echo "|---|------|----------|" >> "$final_readme"
            link_counter=1
            for part in $(ls "$BASE_DIR/${foldername}.zip" "$BASE_DIR/${foldername}.z"* 2>/dev/null | sort); do
              part_basename=$(basename "$part")
              part_encoded=$(urlencode "$part_basename")
              raw_link="https://github.com/${REPO_OWNER}/${REPO_NAME}/raw/${BRANCH}/saved_files/${part_encoded}"
              echo "| $link_counter | \`$part_basename\` | [Download]($raw_link) |" >> "$final_readme"
              link_counter=$((link_counter+1))
            done
            echo "✅ $foldername → $((link_counter-1)) parts"
          done

      - name: Commit and push
        if: success()
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add saved_files/
          git diff --quiet && git diff --staged --quiet || git commit -m "Backup from chat $(date -u '+%Y-%m-%d %H:%M:%S')"
          git push
