name: ⬇️ دانلود از BuzzHeavier

on:
  workflow_dispatch:
    inputs:
      urls:
        description: '🔗 لینک‌های BuzzHeavier (با فاصله جدا کنید)'
        required: true
        type: string
      server:
        description: '🖥️ سرور دانلود'
        required: false
        default: '1'
        type: choice
        options:
          - '1'
          - '2'
          - 'all'
      mode:
        description: '📦 حالت ذخیره‌سازی'
        required: false
        default: 'normal'
        type: choice
        options:
          - normal
          - zip
      password:
        description: '🔒 رمز عبور zip (اختیاری)'
        required: false
        default: ''
        type: string

jobs:
  download:
    runs-on: ubuntu-latest
    timeout-minutes: 120
    permissions:
      contents: write
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Configure Git for Large Files
        run: |
          git config --global http.postBuffer 524288000
          git config --global http.maxRequestBuffer 100M
          git config --global core.compression 0
          git config --global pack.windowMemory 256m
          git config --global pack.packSizeLimit 100m
          git config --global pack.threads 1
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"

      - name: نصب پیش‌نیازها
        run: |
          sudo apt-get update
          sudo apt-get install -y aria2 zip curl bc python3 python3-pip
          pip3 install requests beautifulsoup4

      - name: ایجاد اسکریپت استخراج لینک BuzzHeavier
        run: |
          cat > bh_extractor.py << 'ENDOFSCRIPT'
          import sys, requests
          from bs4 import BeautifulSoup
          from urllib.parse import urljoin
          
          url = sys.argv[1]
          
          try:
              resp = requests.get(url, headers={'User-Agent': 'Mozilla/5.0'}, timeout=30)
              soup = BeautifulSoup(resp.text, 'html.parser')
              
              title = soup.find('title')
              fname = title.text.strip() if title else 'unknown'
              print(f"FILENAME:{fname}")
              
              count = 0
              for a in soup.find_all('a'):
                  link = a.get('hx-get') or a.get('href') or ''
                  if '/download?' in link:
                      count += 1
                      full = urljoin(url, link)
                      txt = a.text.strip()
                      srv = '2' if ('Server 2' in txt or 'alt=true' in link) else '1'
                      print(f"DOWNLOAD_URL:{full}")
                      print(f"SERVER:{srv}")
              
              if count == 0:
                  print("ERROR:no_links", file=sys.stderr)
                  sys.exit(1)
          
          except Exception as e:
              print(f"ERROR:{e}", file=sys.stderr)
              sys.exit(1)
          ENDOFSCRIPT
          
          chmod +x bh_extractor.py

      - name: دانلود فایل‌ها
        run: |
          MODE="${{ github.event.inputs.mode }}"
          URLS="${{ github.event.inputs.urls }}"
          SERVER="${{ github.event.inputs.server }}"
          ZIP_PASSWORD="${{ github.event.inputs.password }}"
          
          SPLIT_THRESHOLD_MB=45
          SPLIT_THRESHOLD_BYTES=$(( SPLIT_THRESHOLD_MB * 1024 * 1024 ))
          
          REPO_OWNER="${{ github.repository_owner }}"
          REPO_NAME="${{ github.event.repository.name }}"
          BRANCH="${GITHUB_REF_NAME}"
          
          BACKUP_DIR="/tmp/download_backup_$$"
          mkdir -p "$BACKUP_DIR"
          echo "$BACKUP_DIR" > /tmp/backup_dir_path.txt
          
          mkdir -p downloads tmp_downloads
          
          # توابع کمکی
          urlencode() {
            python3 -c "import urllib.parse, sys; print(urllib.parse.quote(sys.argv[1], safe=''))" "$1"
          }
          
          get_unique_folder() {
            local BASE_PATH="$1"
            local NAME="$2"
            if [ ! -d "$BASE_PATH/$NAME" ] && [ ! -d "$BACKUP_DIR/$NAME" ]; then
              echo "$NAME"
              return
            fi
            local SUFFIX="_$(date +%s)_$RANDOM"
            echo "${NAME}${SUFFIX}"
          }
          
          # پردازش هر لینک
          for URL in $URLS; do
            echo ""
            echo "════════════════════════════════════"
            echo "🔍 پردازش: $URL"
            
            OUTPUT=$(python3 bh_extractor.py "$URL" 2>/tmp/err.log)
            RC=$?
            
            if [ $RC -ne 0 ]; then
              echo "❌ خطا:"
              cat /tmp/err.log
              continue
            fi
            
            echo "$OUTPUT"
            
            FNAME=$(echo "$OUTPUT" | grep "^FILENAME:" | head -1 | cut -d: -f2-)
            [ -z "$FNAME" ] && FNAME="file_$(date +%s)"
            FNAME=$(echo "$FNAME" | sed 's/[<>:"|?*]/_/g')
            echo "📁 فایل: $FNAME"
            
            # انتخاب لینک دانلود
            if [ "$SERVER" = "all" ]; then
              URLS_DL=$(echo "$OUTPUT" | grep "^DOWNLOAD_URL:" | cut -d: -f2-)
            elif [ "$SERVER" = "2" ]; then
              URLS_DL=$(echo "$OUTPUT" | grep -B1 "SERVER:2" | grep "^DOWNLOAD_URL:" | cut -d: -f2-)
              [ -z "$URLS_DL" ] && URLS_DL=$(echo "$OUTPUT" | grep "^DOWNLOAD_URL:" | head -1 | cut -d: -f2-)
            else
              URLS_DL=$(echo "$OUTPUT" | grep "^DOWNLOAD_URL:" | head -1 | cut -d: -f2-)
            fi
            
            [ -z "$URLS_DL" ] && { echo "❌ لینکی پیدا نشد"; continue; }
            
            # دانلود
            N=0
            echo "$URLS_DL" | while read DL; do
              [ -z "$DL" ] && continue
              N=$((N + 1))
              DL=$(echo "$DL" | sed 's/&amp;/\&/g')
              
              if [ "$SERVER" = "all" ] && [ $N -gt 1 ]; then
                SNAME="s${N}_${FNAME}"
              else
                SNAME="$FNAME"
              fi
              
              echo "⏬ [$N] $SNAME"
              
              aria2c -x8 -s8 -k20M --max-tries=5 -d tmp_downloads -o "$SNAME" "$DL" 2>&1 || {
                echo "⚠️ fallback to curl..."
                curl -L -o "tmp_downloads/$SNAME" -A "Mozilla/5.0" -H "Referer: $URL" "$DL" --retry 3 -#
              }
            done
          done
          
          # نمایش فایل‌های دانلود شده
          echo ""
          echo "📊 فایل‌های دانلود شده:"
          ls -lh tmp_downloads/ 2>/dev/null || echo "خالی"
          
          [ -z "$(ls -A tmp_downloads 2>/dev/null)" ] && { echo "❌ فایلی نیست"; exit 1; }
          
          # بسته‌بندی
          echo "📦 بسته‌بندی..."
          
          if [ "$MODE" = "zip" ]; then
            ARCHIVE_NAME="buzzheavier_$(date +%Y%m%d_%H%M%S)"
            FOLDER_NAME=$(get_unique_folder "$BACKUP_DIR" "$ARCHIVE_NAME")
            mkdir -p "$BACKUP_DIR/$FOLDER_NAME"
            
            VALID_FILES=()
            for f in tmp_downloads/*; do
              [ -f "$f" ] && [ -s "$f" ] && VALID_FILES+=("$f")
            done
            
            if [ ${#VALID_FILES[@]} -gt 0 ]; then
              if [ -n "$ZIP_PASSWORD" ]; then
                zip -j -P "${ZIP_PASSWORD}" -s ${SPLIT_THRESHOLD_MB}m \
                  "$BACKUP_DIR/$FOLDER_NAME/${ARCHIVE_NAME}.zip" "${VALID_FILES[@]}"
              else
                zip -j -s ${SPLIT_THRESHOLD_MB}m \
                  "$BACKUP_DIR/$FOLDER_NAME/${ARCHIVE_NAME}.zip" "${VALID_FILES[@]}"
              fi
              
              # README برای آرشیو
              {
                echo "# ${ARCHIVE_NAME}"
                echo ""
                echo "| # | فایل | حجم |"
                echo "|---|------|------|"
                N=0
                for f in "${VALID_FILES[@]}"; do
                  N=$((N + 1))
                  SZ=$(du -h "$f" | cut -f1)
                  echo "| $N | $(basename "$f") | $SZ |"
                done
              } > "$BACKUP_DIR/$FOLDER_NAME/README.md"
            fi
          else
            for FILE in tmp_downloads/*; do
              [ -f "$FILE" ] || continue
              [ -s "$FILE" ] || continue
              
              BASENAME=$(basename "$FILE")
              SIZE=$(stat -c%s "$FILE")
              
              FOLDER_NAME=$(get_unique_folder "$BACKUP_DIR" "${BASENAME%.*}")
              mkdir -p "$BACKUP_DIR/$FOLDER_NAME"
              
              if [ "$SIZE" -gt "$SPLIT_THRESHOLD_BYTES" ]; then
                echo "📦 ${BASENAME} ($((SIZE/1024/1024))MB) - تقسیم..."
                if [ -n "$ZIP_PASSWORD" ]; then
                  zip -j -P "${ZIP_PASSWORD}" -s ${SPLIT_THRESHOLD_MB}m \
                    "$BACKUP_DIR/$FOLDER_NAME/${FOLDER_NAME}.zip" "$FILE"
                else
                  zip -j -s ${SPLIT_THRESHOLD_MB}m \
                    "$BACKUP_DIR/$FOLDER_NAME/${FOLDER_NAME}.zip" "$FILE"
                fi
              else
                if [ -n "$ZIP_PASSWORD" ]; then
                  zip -j -P "${ZIP_PASSWORD}" "$BACKUP_DIR/$FOLDER_NAME/${FOLDER_NAME}.zip" "$FILE"
                else
                  zip -j "$BACKUP_DIR/$FOLDER_NAME/${FOLDER_NAME}.zip" "$FILE"
                fi
              fi
              
              # README
              PARTS=$(ls "$BACKUP_DIR/$FOLDER_NAME/"*.z* 2>/dev/null | wc -l)
              FOLDER_ENCODED=$(urlencode "${FOLDER_NAME}")
              
              {
                echo "# ${BASENAME}"
                echo ""
                echo "| مشخصات | مقدار |"
                echo "|--------|-------|"
                echo "| **حجم** | $((SIZE/1024/1024))MB |"
                echo "| **تعداد بخش** | $PARTS |"
                echo ""
                echo "## لینک دانلود"
                echo "[📥 دانلود](https://github.com/${REPO_OWNER}/${REPO_NAME}/tree/${BRANCH}/downloads/${FOLDER_ENCODED})"
              } > "$BACKUP_DIR/$FOLDER_NAME/README.md"
            done
          fi
          
          rm -rf tmp_downloads
          
          # کپی به downloads
          mkdir -p downloads
          cp -r "$BACKUP_DIR"/* downloads/ 2>/dev/null || true
          
          echo "✅ تمام"

      - name: Update README.md
        run: |
          BACKUP_DIR=$(cat /tmp/backup_dir_path.txt)
          REPO_OWNER="${{ github.repository_owner }}"
          REPO_NAME="${{ github.event.repository.name }}"
          BRANCH="${GITHUB_REF_NAME}"
          REPO_URL="${{ github.server_url }}/${{ github.repository }}/tree/${{ github.ref_name }}/downloads"
          
          urlencode() {
            python3 -c "import urllib.parse, sys; print(urllib.parse.quote(sys.argv[1], safe=''))" "$1"
          }
          
          mkdir -p downloads
          cp -r "$BACKUP_DIR"/* downloads/ 2>/dev/null || true
          
          FOLDERS=$(find downloads -mindepth 1 -maxdepth 1 -type d 2>/dev/null | sort)
          
          {
            echo "# 📥 فایل‌های دانلود شده"
            echo ""
            for folder in $FOLDERS; do
              FNAME=$(basename "$folder")
              FENC=$(urlencode "$FNAME")
              echo "- [📁 $FNAME]($REPO_URL/$FENC)"
            done
            echo ""
            echo "---"
            echo "📅 $(date '+%Y-%m-%d %H:%M:%S')"
          } > "downloads/README.md"
          
          # بروزرسانی README اصلی
          if [ ! -f "README.md" ]; then
            echo "# Downloader" > README.md
          fi
          
          {
            echo ""
            echo "## 📥 آخرین دانلودها"
            echo ""
            for folder in $FOLDERS; do
              FNAME=$(basename "$folder")
              FENC=$(urlencode "$FNAME")
              echo "- [$FNAME]($REPO_URL/$FENC)"
            done
          } >> README.md

      - name: Incremental Push
        run: |
          BRANCH="${GITHUB_REF_NAME}"
          BACKUP_DIR=$(cat /tmp/backup_dir_path.txt)
          
          urlencode() {
            python3 -c "import urllib.parse, sys; print(urllib.parse.quote(sys.argv[1], safe=''))" "$1"
          }
          
          # Pull آخرین تغییرات
          git fetch origin "$BRANCH" --quiet 2>/dev/null || true
          git reset --hard origin/"$BRANCH" 2>/dev/null || true
          
          # کپی فایل‌ها
          mkdir -p downloads
          cp -r "$BACKUP_DIR"/* downloads/ 2>/dev/null || true
          
          # جمع‌آوری فایل‌ها
          ALL_FILES=()
          while IFS= read -r -d '' FILE; do
            ALL_FILES+=("$FILE")
          done < <(find downloads -type f -print0 2>/dev/null)
          
          TOTAL=${#ALL_FILES[@]}
          echo "📊 تعداد فایل‌ها: $TOTAL"
          
          if [ $TOTAL -eq 0 ]; then
            echo "فایلی برای push نیست"
            exit 0
          fi
          
          # Push دسته‌ای (هر بار 3 فایل)
          BATCH=3
          PUSHED=0
          
          for ((i=0; i<TOTAL; i+=BATCH)); do
            BATCH_FILES=("${ALL_FILES[@]:i:BATCH}")
            PUSHED=$((PUSHED + ${#BATCH_FILES[@]}))
            
            echo "📤 Push batch $((i/BATCH + 1)) ($PUSHED/$TOTAL)..."
            
            for BF in "${BATCH_FILES[@]}"; do
              git add -f "$BF" 2>/dev/null || true
            done
            
            if ! git diff --cached --quiet 2>/dev/null; then
              git commit -m "📥 Batch $((i/BATCH + 1)) [skip ci]" --quiet 2>/dev/null || true
              
              for retry in {1..5}; do
                if timeout 180 git push origin HEAD:"$BRANCH" 2>&1; then
                  echo "  ✅ موفق"
                  break
                fi
                echo "  🔄 تلاش $retry..."
                sleep $((5 + RANDOM % 10))
              done
            fi
          done
          
          echo "✅ آپلود کامل شد"
